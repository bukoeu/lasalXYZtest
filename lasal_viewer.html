    :root { color-scheme: light; --bg:#f7f8fa; --panel:#ffffff; --ink:#17202a; --muted:#607080; --line:#d8dee6; --accent:#1f6feb; --soft:#eef4ff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Segoe UI, Arial, sans-serif; color:var(--ink); background:var(--bg); }

    .row { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
    .path { font-family: Consolas, monospace; font-size:13px; overflow-wrap:anywhere; }
    .small { color:var(--muted); font-size:12px; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    pre { white-space:pre-wrap; margin:8px 0 0; background:#f2f4f7; border:1px solid var(--line); padding:10px; border-radius:6px; font-family:Consolas, monospace; font-size:12px; line-height:1.45; }
    .hit { display:grid; grid-template-columns:54px 1fr; gap:8px; }
    .line { color:var(--muted); text-align:right; }
    .empty { color:var(--muted); padding:22px; text-align:center; }
    .quick { display:grid; gap:8px; }
    .quick a { display:block; padding:7px 8px; border-radius:6px; color:var(--ink); }
    .quick a:hover { background:var(--soft); text-decoration:none; }
    @media (max-width: 820px) {
      .layout { grid-template-columns:1fr; }
      aside { position:static; height:auto; border-right:0; border-bottom:1px solid var(--line); }

  <script>
    const files = [{rel:"Class\\_AxisBase\\_AxisBase.st",name:"_AxisBase.st",category:"Class",ext:".st",kb:163.5,url:"file:///C:/tmp/LSLCL2/LASAL/Class/_AxisBase/_AxisBase.st",hits:[{n:6,t:"<Class"},{n:21,t:"IconPath           = \".\\Class\\_AxisBase\\LMCAxis.ico\""},{n:24,t:"Comment            = \"The CNC class represents a profile generator for 1 axis. It calculates the actual &#13;&#10;set position and provides with the set and actual values to the controller class.&#13;&#10;&#13;&#10;The CNC class also contains all the functions/interfaces needed to drive an axis.&#13;&#10;&#13;&#10;\">"},{n:26,t:"<Server Name=\"AxisStatus\" GUID=\"{68B6CC31-3184-4BD8-9AEF-5517DF33D4FB}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Stateflags of the axis&#13;&#10;======================&#13;&#10;&#13;&#10;Bit 1: PowerOn - Set if the Axis is activated  &#13;&#10;Bit 2: IsReferenced - Set if the Axis is referenced&#13;&#10;Bit 3: InPosition - Set if the axis is in the correct position&#13;&#10;Bit 4: FiltRdy - Set if the Axis is in position and jerk filter is ready&#13;&#10;Bit 5: Decell - Set if the axis brakes; calculated by tic for tic&#13;&#10;Bit 6: PosLimActive - Set if the axis has achieved one of its end-positions&#13;&#10;Bit 7: SetFlg - Set by calling the SetPositon, CNCRefRun and NCRefRun functions Reset after activating the controller&#13;&#10;Bit 8: EnLesFlg - Set if the axis moves endless / infinitely&#13;&#10;Bit 9: DirFlg - Set if the Speed of the axis is negative&#13;&#10;Bit 10: EmergStop - Set if the axis stops, because an error occurs or the axis is deactivated&#13;&#10;Bit 11: Overflow- Set if a position overflow occurs&#13;&#10;Bit 12: MasterLock - Set if the slave-axis is coupled onto the master-axis&#13;&#10;Bit 13: AutoRun - Set if autotuning is running&#13;&#10;Bit 14: AutoStop - Set if autotuning is ready done&#13;&#10;Bit 15: ActDirFlag - Set if the Speed of the axis is negative&#13;&#10;Bit 16: HandFlag - Set if the function &quot;MoveHand&quot; or &quot;PowerOff&quot; is called.&#13;&#10;Bit 17: ModuloFlg - Set if the axis is defined as a modulo-axis&#13;&#10;Bit 18: NCMotion - Is set by the controller if the axis is in the NC positioning-mode&#13;&#10;Bit 19: NoActPosMeth - Set if the client &quot;ActPosition&quot; is not connected or the simulation mode is acting&#13;&#10;Bit 20: NoControlMeth - Set if the client &quot;LMCController&quot; is not connected or the simulation mode is acting&#13;&#10;Bit 21: NoRefMeth - Set if the client &quot;LMCReference&quot; is not connected or the Bit 19: &quot;NoActPosMeth&quot; is set&#13;&#10;Bit 22: NoActPosChk - Set if the client &quot;LMCSafety&quot; is not connected or HWReady is not connected (simulation mode is acting)&#13;&#10;Bit 23: NoPreCyclic - Set if the client &quot;LMCPreCyclicTrigger&quot; is not connected&#13;&#10;Bit 24: NoPostCyclic - Set if the client &quot;LMCPostCyclicTrigger&quot; is not connected&#13;&#10;Bit 25: DelayedMasterLock - configureable, alternative version of the MasterLock bit&#13;&#10;Bit 26: Standstill - Set if the axis is currently not moving.&#13;&#10;Bit 27: BrakeForPowerOff - Set, if the axis is currently stoping for power off.&#13;&#10;Bit 28: MasterError - Set, if some error of the master axis occured.&#13;&#10;Bit 29: SlaveError - Set, if some error of a coupled slave axis occured.\"/>"},{n:34,t:"Comment        = \"This server is the interface to the user application, so that &#13;&#10;axis commands can be sent.&#13;&#10;&#13;&#10;Operation mode of the axis&#13;&#10;=========================&#13;&#10;&#13;&#10;PASSIVE_LMCAXIS  - The axis is in the passive rest state according to a reset&#13;&#10;WAITIDLE_LMCAXIS - The axis is in the passive rest state according to call of the methode &quot;PowerOn&quot;&#13;&#10;IDLE_LMCAXIS     - The axis is in an active rest state and ready for move-instructions&#13;&#10;MOVE_LMCAXIS     - The axis carries out a movement&#13;&#10;FOLLOW_LMCAXIS   - The axis is in the status: Follow&#13;&#10;STOPED_LMCAXIS   - The axis stops for the standstill&#13;&#10;LOCKED_LMCAXIS   - The slave axis couples to a master axis or is already coupled&#13;&#10;REFRUN_LMCAXIS   - The axis carries out a reference movement&#13;&#10;TUNEPOS_LMCAXIS  - The axis carries out a tune movement - in this case, it moves in the positive direction&#13;&#10;TUNENEG_LMCAXIS  - The axis carries out a tune movement - in this case, it moves in the negative direction&#13;&#10;ERROR_LMCAXIS    - An error occurred\">"},{n:36,t:"<Function Name=\"IPRPowerOn\" Comment=\"This command activates the position controller.\">"},{n:38,t:"<Parameter Name=\"Mode\" Comment=\"Set direction of movement for the axis\"/>"},{n:41,t:"<Parameter Name=\"CommandState\" Comment=\"Status flags of the axis\"/>"},{n:43,t:"</Function>"},{n:44,t:"<Function Name=\"IPRPowerOff\" Comment=\"This command deactivates the position controller.\">"},{n:49,t:"<Parameter Name=\"CommandState\" Comment=\"Status flags of the axis\"/>"},{n:51,t:"</Function>"},{n:52,t:"<Function Name=\"IPRMoveRelative\" Comment=\"axis relative position movement\">"},{n:56,t:"<Parameter Name=\"Speed\" Comment=\"Axis speed of the movement [Application units / s]\"/>"},{n:57,t:"<Parameter Name=\"Accel\" Comment=\"Axis acceleration of the movement [Application units / s2]\"/>"},{n:58,t:"<Parameter Name=\"Decel\" Comment=\"Axis deceleration of the movement [Application units / s2]\"/>"},{n:61,t:"<Parameter Name=\"CommandState\" Comment=\"Status flags of the axis\"/>"},{n:63,t:"</Function>"},{n:64,t:"<Function Name=\"IPRMoveAbsolute\" Comment=\"axis movement to an absolute position\">"},{n:66,t:"<Parameter Name=\"Position\" Comment=\"Targetposition for the axis [Application units]\"/>"},{n:67,t:"<Parameter Name=\"Speed\" Comment=\"Axis speed of the movement [Application units / s]\"/>"},{n:68,t:"<Parameter Name=\"Accel\" Comment=\"Axis acceleration of the movement [Application units / s2]\"/>"},{n:69,t:"<Parameter Name=\"Decel\" Comment=\"Axis deceleration of the movement [Application units / s2]\"/>"},{n:72,t:"<Parameter Name=\"CommandState\" Comment=\"Status flags of the axis\"/>"},{n:74,t:"</Function>"}]},
{rel:"Class\\_BusInterfaceSdiasDriveMng\\_BusInterfaceSdiasDriveMng.st",name:"_BusInterfaceSdiasDriveMng.st",category:"Class",ext:".st",kb:88,url:"file:///C:/tmp/LSLCL2/LASAL/Class/_BusInterfaceSdiasDriveMng/_BusInterfaceSdiasDriveMng.st",hits:[{n:30,t:"#include \"..\\..\\class\\_drivemngbase\\drivemngbase.h\""},{n:33,t:"<Class"},{n:45,t:"IconPath           = \".\\Class\\_DriveMngBase\\Drive.ico\""},{n:58,t:"<File Path=\".\\class\\_drivemngbase\\drivemngbase.h\" Include=\"true\"/>"},{n:63,t:"<Dokumentation Revision=\"1.10\" Date=\"20.03.2018\" Author=\"FurDom\" Company=\"Sigmatek\" Description=\"When reinitializing the drive with the server SDDCmdIntfc of the _DriveAxis class, the CmdState of the class _BusInterfaceSdiasDriveMng is no longer set to &quot;_NotInitialized&quot;, so that no error occurs with the DC06x modules. The status is internally passed on to keep the process the same as with the SDD300 and MDD100 drives.\"/>"},{n:64,t:"<Dokumentation Revision=\"1.9\" Date=\"23.01.2018\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Log messages have been standardized for easier maintenance, easier use in any class and to allow spam filtering. Code for the logging functions is now only located in HwControl.\"/>"},{n:65,t:"<Dokumentation Revision=\"1.8\" Date=\"16.05.2017\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"When adding an SDO (i.e. via ReadSPIData) from background priority it was possible that the adding process got interrupted by receiving the answer to this SDO which is handled in cyclic priority. In the error case the answer was unexpected and therefore ignored. Then the class signals a timeout while waiting for the answer, which already arrived before waiting for it. Added mutex and changed instruction order to prevent this error.\"/>"},{n:67,t:"<Dokumentation Revision=\"1.6\" Date=\"17.03.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added HW Version for sdias clients.\"/>"},{n:70,t:"<Dokumentation Revision=\"1.3\" Date=\"30.01.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"The parameters for creating DOs were not correctly initialized if SdiasManager class v1.63 or higher has been used.\"/>"},{n:81,t:"Class      = \"SdiasBase\""},{n:120,t:"</Class>"},{n:124,t:"_BusInterfaceSdiasDriveMng : CLASS"},{n:402,t:"//! <Function Comment=\"Realtime Update Methode which runs in PreScan.\" Name=\"UpdateRt\"/>"},{n:403,t:"FUNCTION VIRTUAL GLOBAL UpdateRt;"},{n:404,t:"//! <Function Comment=\"Realtime Update Methode which runs in PostScan.\" Name=\"UpdateRtPostScan\"/>"},{n:405,t:"FUNCTION VIRTUAL GLOBAL UpdateRtPostScan;"},{n:407,t:"FUNCTION VIRTUAL GLOBAL AddAccesses"},{n:411,t:"//! <Function Comment=\"Methode is called if this Module gets connected.\" Name=\"ConnectEvent\"/>"},{n:412,t:"FUNCTION VIRTUAL GLOBAL ConnectEvent;"},{n:413,t:"//! <Function Comment=\"Methode is called if this Module gets disconnected.\" Name=\"DisconnectEvent\"/>"},{n:414,t:"FUNCTION VIRTUAL GLOBAL DisconnectEvent;"},{n:415,t:"//! <Function Comment=\"This Methode should be used, to check the DeviceID of the Module.\" Name=\"CheckDeviceID\"/>"},{n:416,t:"FUNCTION VIRTUAL GLOBAL CheckDeviceID"},{n:423,t:"//! <Function Comment=\"Methode to receive the Response in case of SDO-Communication.\" Name=\"ReceiveSDOResponse\"/>"},{n:424,t:"FUNCTION VIRTUAL ReceiveSDOResponse"}]},
{rel:"Class\\_Can\\_Can.st",name:"_Can.st",category:"Class",ext:".st",kb:19.2,url:"file:///C:/tmp/LSLCL2/LASAL/Class/_Can/_Can.st",hits:[{n:6,t:"<Class"},{n:20,t:"Comment            = \"The OS interface library class _Can can be used to communicate with a CPU or IPC via the CAN bus interface. &#10;&#10;The OS Interface library class _Can is also used by the class _CanLib of the DiasMaster library. &#10;For more information have a look at the _CanLib documentation.\">"},{n:35,t:"</Class>"},{n:37,t:"_Can : CLASS"},{n:137,t:"FUNCTION _Can"},{n:141,t:"//! <Function Comment=\"Checks weather a CAN-Interface is installed or not.\" Name=\"IsInstalled\"/>"},{n:142,t:"FUNCTION __CDECL VIRTUAL GLOBAL IsInstalled"},{n:147,t:"retval (EAX) 	: DINT;			//! <Variable Comment=\"If the function succeeds, it returns 0, meaning that a CAN-Interface is installed. If it fails, an error code is returned, as given below: &#10;  -1 .. invalid parameter &#10;  -2 .. BIOS-Interface is not installed &#10;  -3 .. CAN is not enabled &#10;  -4 .. CAN-Interface is not installed &#10;  -5 .. Initializing of CAN-Interface failed\" Name=\"IsInstalled.retval\"/>"},{n:149,t:"//! <Function Comment=\"This function returns the Station-number of an active CAN-Interface.\" Name=\"GetMyStation\"/>"},{n:150,t:"FUNCTION __CDECL VIRTUAL GLOBAL GetMyStation"},{n:156,t:"retval (EAX) 	: DINT;			//! <Variable Comment=\"If the function succeeds, it returns 0. If it fails, an error code is returned, as given below: &#10;  -1 .. invalid parameter &#10;  -2 .. BIOS-Interface is not installed &#10;  -3 .. CAN is not enabled &#10;  -4 .. CAN-Interface is not installed &#10;  -5 .. Initializing of CAN-Interface failed\" Name=\"GetMyStation.retval\"/>"},{n:158,t:"//! <Function Comment=\"This function sets the Station-number of a LOCAL CAN-Interface.\" Name=\"SetMyStation\"/>"},{n:159,t:"FUNCTION __CDECL VIRTUAL GLOBAL SetMyStation"},{n:165,t:"retval (EAX) 	: DINT;			//! <Variable Comment=\"If the function succeeds, it returns 0. If it fails, an error code is returned, as given below: &#10;  -1 .. invalid parameter &#10;  -2 .. BIOS-Interface is not installed &#10;  -3 .. CAN is not enabled &#10;  -4 .. CAN-Interface is not installed &#10;  -5 .. Initializing of CAN-Interface failed\" Name=\"SetMyStation.retval\"/>"},{n:167,t:"//! <Function Comment=\"This function retrieves the Baud rate of a local CAN-Interface.\" Name=\"GetBaudrate\"/>"},{n:168,t:"FUNCTION __CDECL VIRTUAL GLOBAL GetBaudrate"},{n:174,t:"retval (EAX) 	: DINT;			//! <Variable Comment=\"If the function succeeds, it returns 0. If it fails, an error code is returned, as given below: &#10;  -1 .. invalid parameter &#10;  -2 .. BIOS-Interface is not installed &#10;  -3 .. CAN is not enabled &#10;  -4 .. CAN-Interface is not installed &#10;  -5 .. Initializing of CAN-Interface failed\" Name=\"GetBaudrate.retval\"/>"},{n:176,t:"//! <Function Comment=\"This function sets the Baud rate of a local CAN-Interface.\" Name=\"SetBaudrate\"/>"},{n:177,t:"FUNCTION __CDECL VIRTUAL GLOBAL SetBaudrate"},{n:183,t:"retval (EAX) 	: DINT;			//! <Variable Comment=\"If the function succeeds, it returns 0. If it fails, an error code is returned, as given below: &#10;  -1 .. invalid parameter &#10;  -2 .. BIOS-Interface is not installed &#10;  -3 .. CAN is not enabled &#10;  -4 .. CAN-Interface is not installed &#10;  -5 .. Initializing of CAN-Interface failed\" Name=\"SetBaudrate.retval\"/>"},{n:185,t:"//! <Function Comment=\"Send a single object at the can bus. If the bus or the stack is not free, we put this object on the bus. So it&apos;s only allowed to call this function 20 times within 250us. The CAN stack is not bigger and then you overload the can bus!\" Name=\"CanTxObj\"/>"},{n:186,t:"FUNCTION __CDECL VIRTUAL GLOBAL CanTxObj"},{n:196,t:"//! <Function Comment=\"Add a single object to the can bus. Should only be used for Rx-objects.\" Name=\"AddCanObj\"/>"},{n:197,t:"FUNCTION __CDECL VIRTUAL GLOBAL AddCanObj"},{n:202,t:"mode 	: USINT;			//! <Variable Comment=\"mode 0 = rx without IRQ &#10;mode 1 = rx with IRQ &#10;mode 2 = tx (function CanTxObj should be used)\" Name=\"AddCanObj.mode\"/>"}]},

{rel:"Class\\_DriveAxis\\_DriveAxis.st",name:"_DriveAxis.st",category:"Class",ext:".st",kb:21.7,url:"file:///C:/tmp/LSLCL2/LASAL/Class/_DriveAxis/_DriveAxis.st",hits:[{n:6,t:"<Class"},{n:18,t:"IconPath           = \".\\Class\\_DriveMngBase\\Drive.ico\""},{n:21,t:"Comment            = \"represents the axis on the given Place / AxNo combination\">"},{n:23,t:"<Client Name=\"FileHandle\" Required=\"false\" Internal=\"false\" Comment=\"command client to the class _DriveFileHandling&#13;&#10;The client has to be connected to use the RAMFILE for the drive parameters&#13;&#10;or to export the drive parameter into an excel formated file.\"/>"},{n:26,t:"<Client Name=\"ParaSaveType\" Required=\"false\" Internal=\"false\" Comment=\"Save/Use Type of the drive parameter handling :&#13;&#10;&#13;&#10;0.. User table &#13;&#10;The client ParaTab have to connected to an object of the class _DriveParaTab.&#13;&#10;Is no connection available, the default settings of the drive will be send.&#13;&#10;No parameter changes by an user will be saved.&#13;&#10;&#13;&#10;1.. Lasal2 table&#13;&#10;A Lasal2 table must be connected to a _DriveAxis Object, by selecting the _DriveAxis Object &#13;&#10;in the properties of the lda-File. (see _DriveAxis Documentation).&#13;&#10;Is the Lasal2 drive table not available, the system looks if an user table for the axis exists.(See ParaSaveType = 0)&#13;&#10;No parameter changes by an user will be saved.&#13;&#10;&#13;&#10;2.. drive parameter saved in the SRAM&#13;&#10;In this case the parameter will be saved in the SRAM. The first time of the system start-up, we get the drive parameters of the Lasal2 table.&#13;&#10;(See ParaSaveType = 1). At the second time of the system start-up,the parameters are loaded from the SRAM into the drive&#13;&#10;Any parameter changes by an user will be saved in the SRAM.&#13;&#10;&#13;&#10;3.. drive parameter saved in the RAMFILE&#13;&#10;In this case the parameter will be saved in a RAMFILE if the client cFileHandle is connected to the class _DriveFileHandling.&#13;&#10;This type can only used if a file system is available.&#13;&#10;The first time of the system start-up, we get the drive parameters of the Lasal2 table and save the parameter into the file.&#13;&#10;(See ParaSaveType = 1). At the second time of the system start-up,the parameters are loaded from the file into the drive&#13;&#10;Any parameter changes by an user will be saved in the file.&#13;&#10;&#13;&#10;\"/>"},{n:30,t:"<Client Name=\"TableIndex\" Required=\"false\" Internal=\"false\" Comment=\"With the value from this client, the specific Lasal2 Table is used for parameterizing the axis.&#13;&#10;(Only available for ParaSaveType = 1)\"/>"},{n:37,t:"<Dokumentation Revision=\"1.60\" Date=\"23.03.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Changed some methods to virtual for derivation of class.\"/>"},{n:38,t:"<Dokumentation Revision=\"1.59\" Date=\"02.03.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Corrected that the Read method of the Online Server still returned 1 when the Drive gets disconnected.\"/>"},{n:39,t:"<Dokumentation Revision=\"1.58\" Date=\"15.06.2015\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Prevent access exception in method SetAxTorque if stateword is parametrized in A-VALRT2\"/>"},{n:40,t:"<Dokumentation Revision=\"1.57\" Date=\"26.05.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"The methods SetAbsolutePosition and SetAbsolutePositionEncoder now return -4 if any Axis of the drive is enabled.&#13;&#10;Improvement of AxErrorQuit::Write: ResetFault in control word is now only set if an internal drive error is active (could have lead to a contouring or trajectory error)\"/>"},{n:43,t:"<Dokumentation Revision=\"1.54\" Date=\"27.01.2015\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Optimization of read methods in base class.&#13;&#10;Implemented NewInstcommando for read and write pdo data in base class.\"/>"},{n:47,t:"<Dokumentation Revision=\"1.50\" Date=\"04.12.2013\" Author=\"RauAnd&#13;&#10;&#13;&#10;ObeChr\" Company=\"Sigmatek\" Description=\"Avoid possible recursion in case the read-method of the server Online was overwritten and another read-methode got called.&#13;&#10;In case of ParaSaveType = 2 / 3 also K-Parameters got stored in the SRAM / RamFile. Now this Parameters are not stored retentive.\"/>"},{n:48,t:"<Dokumentation Revision=\"1.40\" Date=\"21.03.2013\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Since the last change of the class there was a problem if a 32 bit control word has been used. The initial torque value has not been written to the drive, therefore the axis couldn&apos;t move without a manual correction of the torque value.\"/>"},{n:49,t:"<Dokumentation Revision=\"1.30\" Date=\"06.03.2013\" Author=\"RamAnd&#13;&#10;RamAnd\" Company=\"Sigmatek\" Description=\"An invalid length value for the crc32 calculation of the parameter data could have lead to a runtime error.&#13;&#10;If a _DriveAxis has been placed in a complex network, the table name could not be generated since the last correction in the _DriveAxisSet class.\"/>"},{n:50,t:"<Dokumentation Revision=\"1.20\" Date=\"05.11.2012\" Author=\"ObeChr&#13;&#10;ObeChr\" Company=\"Sigmatek\" Description=\"The Paramterfile for the axis can now be selected by index.&#13;&#10;With the method SetAbsolutePositionEncoder an offset can be stored in the feedback.\"/>"},{n:51,t:"<Dokumentation Revision=\"1.11\" Date=\"17.09.2012\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added new Server SerialNo to show the serial number of this axis module\"/>"},{n:52,t:"<Dokumentation Revision=\"1.10\" Date=\"31.10.2011\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"If a state word was mapped but no control word, an access exception occured when the class tried to quit an error automatically.\"/>"},{n:54,t:"<Dokumentation Revision=\"1.8\" Date=\"15.09.2011\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"If the client Extend is not set but there are extended parameters defined (A-VALRT2, A-VALTT2), the class now removes the extended parameters.\"/>"},{n:56,t:"<Dokumentation Revision=\"1.6\" Date=\"30.11.2010\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"When LASAL fetches a parameter value, now this value is also refreshed on the corresponding parameter class.\"/>"},{n:70,t:"Class      = \"_DriveAxisBase\""},{n:106,t:"Class      = \"MerkerEx\""},{n:117,t:"Class      = \"RAMex\""},{n:130,t:"Class      = \"_DriveAxisSet\""},{n:190,t:"</Class>"},{n:194,t:"_DriveAxis : CLASS"}]},
{rel:"Class\\_DriveAxisBase\\_DriveAxisBase.st",name:"_DriveAxisBase.st",category:"Class",ext:".st",kb:140.9,url:"file:///C:/tmp/LSLCL2/LASAL/Class/_DriveAxisBase/_DriveAxisBase.st",hits:[{n:12,t:"#include \"..\\..\\Class\\_DriveMngBase\\SDDDefinitions.h\""},{n:13,t:"#include \"..\\..\\Class\\HwControl\\HwControl.h\""},{n:16,t:"<Class"},{n:28,t:"IconPath           = \".\\Class\\_DriveMngBase\\Drive.ico\""},{n:31,t:"Comment            = \"this class prepare the actual values and the incomming setpoints\">"},{n:38,t:"<Server Name=\"AxError\" GUID=\"{AB399615-2D37-44C2-8BBF-5D6D506DF075}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"0 .. no error&#13;&#10;1 .. Axis has an error\"/>"},{n:39,t:"<Server Name=\"AxErrorQuit\" GUID=\"{3AA1B785-46E0-41CD-A4ED-90935075A5E3}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"false\" Retentive=\"false\" Comment=\"a write command quits the actual error state of the axle\"/>"},{n:42,t:"<Server Name=\"CmdState\" GUID=\"{C0257BBF-174C-49D2-8201-0B4BED56BBE1}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Displays the actual state of the Class&#13;&#10;(QUIT = disabled by client AxisNo)\"/>"},{n:44,t:"<Server Name=\"I_HC\" GUID=\"{8AFC09FE-5A20-47C3-BC1E-F4D9F439F5BE}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Shows Hardware Code of this axis&#13;&#10;&#13;&#10;Bit 31..16 Hardware Code of the Control Board&#13;&#10;Bit 15...8 Software version of the feedback CPLD&#13;&#10;Bit   7...0 Hardware Code of the Power Stage\"/>"},{n:45,t:"<Server Name=\"Online\" GUID=\"{CAF477F1-A28E-4611-B487-DA521DD0D7C0}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"displays if the class is ready to work with the application\"/>"},{n:46,t:"<Server Name=\"SDDCmdIntfc\" GUID=\"{24EEE8C3-EAC3-433F-ACDD-DAB261FE5FAB}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"false\" Retentive=\"false\" Comment=\"Server for user commands to the drive :&#13;&#10;_SDDIDLE     .. default command&#13;&#10;_SDDREADALL  .. read all parameters of the drive &#13;&#10;  and save the parameters in the SRAM or in the file&#13;&#10;  Are any parameter classes connected to the class SDDMngBase,&#13;&#10;  the server of the parameter classes are refreshed&#13;&#10;_SDDINIT     .. Initialize the drive with the saved parameters&#13;&#10;_SDDURINIT   .. Initialize the drive with the parameters of the table &#13;&#10;  (Lasal2 table, User Table or default table)&#13;&#10;_SDDEXDATA   .. export the actual drive parameter into an excel formated file\"/>"},{n:47,t:"<Server Name=\"SerialNo\" GUID=\"{1F2B66E1-39C5-490A-9A9A-D23553AD8EAC}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Serial number of this axis module (or drive if a SDD is used)\"/>"},{n:54,t:"<Client Name=\"AxisNo\" Required=\"true\" Internal=\"false\" Comment=\"1 - 3: select axis&#13;&#10;&lt;1 or &gt;3: object disabled (Server CmdState will be set to QUIT)\"/>"},{n:63,t:"<File Path=\".\\Class\\_DriveMngBase\\SDDDefinitions.h\" Include=\"true\"/>"},{n:64,t:"<File Path=\".\\Class\\HwControl\\HwControl.h\" Include=\"true\"/>"},{n:72,t:"<Dokumentation Revision=\"1.69\" Date=\"23.03.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Changed some methods to virtual for derivation of class.\"/>"},{n:73,t:"<Dokumentation Revision=\"1.68\" Date=\"02.03.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Corrected that the Read method of the Online Server still returned 1 when the Drive gets disconnected.\"/>"},{n:74,t:"<Dokumentation Revision=\"1.67\" Date=\"15.06.2015\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Prevent access exception in method SetAxTorque if stateword is parametrized in A-VALRT2\"/>"},{n:75,t:"<Dokumentation Revision=\"1.66\" Date=\"08.04.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"SetAbsolutePositionEncoder now returns -4 if the Axis is enabled. If any other axis of this drive is enabled the method also doesn&apos;t work, but now the error is handled correctly so that after disabling all axis it will work.&#13;&#10;Improvement of AxErrorQuit::Write: ResetFault in control word is now only set if an internal drive error is active (could have lead to a contouring or trajectory error)\"/>"},{n:80,t:"<Dokumentation Revision=\"1.61\" Date=\"30.06.2014\" Author=\"PieSte\" Company=\"Sigmatek\" Description=\"Add compability for sdias drive CanOpen parameter.\"/>"},{n:81,t:"<Dokumentation Revision=\"1.60\" Date=\"04.12.2013\" Author=\"RauAnd&#13;&#10;&#13;&#10;ObeChr\" Company=\"Sigmatek\" Description=\"Avoid possible recursion in case the read-method of the server Online was overwritten and another read-methode got called.&#13;&#10;In case of ParaSaveType = 2 / 3 also K-Parameters got stored in the SRAM / RamFile. Now this Parameters are not stored retentive.\"/>"},{n:82,t:"<Dokumentation Revision=\"1.50\" Date=\"21.03.2013\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Since the last change of the class there was a problem if a 32 bit control word has been used. The initial torque value has not been written to the drive, therefore the axis couldn&apos;t move without a manual correction of the torque value.\"/>"},{n:84,t:"<Dokumentation Revision=\"1.30\" Date=\"05.11.2012\" Author=\"ObeChr\" Company=\"Sigmatek\" Description=\"With the method SetAbsolutePositionEncoder an offset can be stored in the feedback.\"/>"},{n:85,t:"<Dokumentation Revision=\"1.21\" Date=\"17.09.2012\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added new Parameter A-CAPFT (time base for capture inputs)&#13;&#10;Added new Server SerialNo to show the serial number of this axis module\"/>"},{n:88,t:"<Dokumentation Revision=\"1.18\" Date=\"18.01.2012\" Author=\"ZoePat\" Company=\"Sigmatek\" Description=\"The object can now be disabled by setting the client AxisNo &lt;1 or &gt;3. The cmdstate will be set to QUIT, to show the disabled state.\"/>"}]},

ameter saved in the SRAM&#13;&#10;In this case the parameter will be saved in the SRAM. The first time of the system start-up, we get the drive parameters of the Lasal2 table.&#13;&#10;(See ParaSaveType = 1). At the second time of the system start-up,the parameters are loaded from the SRAM into the drive&#13;&#10;Any parameter changes by an user will be saved in the SRAM.&#13;&#10;&#13;&#10;3.. drive parameter saved in the RAMFILE&#13;&#10;In this case the parameter will be saved in a RAMFILE if the client cFileHandle is connected to the class _DriveFileHandling.&#13;&#10;This type can only used if a file system is available.&#13;&#10;The first time of the system start-up, we get the drive parameters of the Lasal2 table and save the parameter into the file.&#13;&#10;(See ParaSaveType = 1). At the second time of the system start-up,the parameters are loaded from the file into the drive&#13;&#10;Any parameter changes by an user will be saved in the file.&#13;&#10;&#13;&#10;\"/>"},{n:32,t:"<Client Name=\"TableIndex\" Required=\"false\" Internal=\"false\" Comment=\"With the value from this client, the specific Lasal2 Table is used for parameterizing the axis.&#13;&#10;(Only available for ParaSaveType = 1)\"/>"},{n:36,t:"<File Path=\".\\Class\\_DriveMngBase\\SDDDefinitions.h\" Include=\"true\"/>"},{n:41,t:"<Dokumentation Revision=\"1.20\" Date=\"06.03.2013\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"If a _DriveAxis has been placed in a complex network, the table name could not be generated since the last correction in the _DriveAxisSet class.\"/>"},{n:42,t:"<Dokumentation Revision=\"1.10\" Date=\"05.11.2012\" Author=\"ObeChr\" Company=\"Sigmatek\" Description=\"The Paramterfile for the axis can now be selected by index\"/>"},{n:47,t:"</Class>"},{n:49,t:"_DriveAxisSet : CLASS"},{n:64,t:"FUNCTION GLOBAL GetInitType"},{n:69,t:"FUNCTION GLOBAL GetUserTab"},{n:78,t:"FUNCTION GLOBAL GetL2Tab"},{n:88,t:"FUNCTION GetFnctName"},{n:96,t:"FUNCTION GLOBAL GetMemPtr"},{n:1 {rel:"Class\\_DriveMng_DC062\\_DriveMng_DC062.st",name:"_DriveMng_DC062.st",category:"Class",ext:".st",kb:17.9,url:"file:///C:/tmp/LSLCL2/LASAL/Class/_DriveMng_DC062/_DriveMng_DC062.st",hits:[{n:6,t:"<Class"},{n:19,t:"IconPath           = \".\\Class\\_DriveMngBase\\Drive.ico\""},{n:22,t:"Comment            = \"manages the whole sdias communication between&#13;&#10;the Drive and the application\">"},{n:24,t:"<Server Name=\"FwDate\" GUID=\"{D919698B-83A9-4F69-BBDB-248F916C72E2}\" Class=\"VirtualBaseInit\" Visualized=\"false\" Initialize=\"true\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"use this channel to access the string functions\"/>"},{n:25,t:"<Server Name=\"FWVersion\" GUID=\"{293E1D9D-F322-4F38-9D4E-12E9407502AE}\" Class=\"VirtualBaseInit\" Visualized=\"false\" Initialize=\"true\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"use this channel to access the string functions\"/>"},{n:31,t:"<Client Name=\"Place\" Required=\"false\" Internal=\"false\" Comment=\"Place of SDIAS Modul [0..63].\"/>"},{n:39,t:"<Dokumentation Revision=\"1.15\" Date=\"20.03.2018\" Author=\"FurDom\" Company=\"Sigmatek\" Description=\"When reinitializing the drive with the server SDDCmdIntfc of the _DriveAxis class, the CmdState of the class _BusInterfaceSdiasDriveMng is no longer set to &quot;_NotInitialized&quot;, so that no error occurs with the DC06x modules. The status is internally passed on to keep the process the same as with the SDD300 and MDD100 drives.\"/>"},{n:40,t:"<Dokumentation Revision=\"1.14\" Date=\"23.01.2018\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Log messages have been standardized for easier maintenance, easier use in any class and to allow spam filtering. Code for the logging functions is now only located in HwControl.\"/>"},{n:41,t:"<Dokumentation Revision=\"1.13\" Date=\"16.05.2017\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"When adding an SDO (i.e. via ReadSPIData) from background priority it was possible that the adding process got interrupted by receiving the answer to this SDO which is handled in cyclic priority. In the error case the answer was unexpected and therefore ignored. Then the class signals a timeout while waiting for the answer, which already arrived before waiting for it. Added mutex and changed instruction order to prevent this error.\"/>"},{n:43,t:"<Dokumentation Revision=\"1.11\" Date=\"02.05.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Added new NewInst commando for Lasal2 to get Transparent state.\"/>"},{n:46,t:"<Dokumentation Revision=\"1.8\" Date=\"01.03.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Corrected BoundExceed Error in base class at Write method of LEDControl Server when Place = LSL_DEACTIVATED.\"/>"},{n:48,t:"<Dokumentation Revision=\"1.6\" Date=\"26.05.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added possibility to get enabled Axis which is needed to set absolute position of axis.\"/>"},{n:50,t:"<Dokumentation Revision=\"1.4\" Date=\"17.03.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added HW Version for sdias clients.\"/>"},{n:51,t:"<Dokumentation Revision=\"1.3\" Date=\"06.03.2015\" Author=\"PieSte\" Company=\"Sigmatek\" Description=\"Changed commands for businterface to be compatible with new drive hardware.&#13;&#10;Changed visual state of FwNumString and FwDateString object for lse displaying.\"/>"},{n:53,t:"<Dokumentation Revision=\"1.1\" Date=\"30.01.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"The parameters for creating DOs were not correctly initialized if SdiasManager class v1.63 or higher has been used.\"/>"},{n:62,t:"Class      = \"_DriveMngBase\""},{n:89,t:"Class      = \"_BusInterfaceSdiasDriveMng\""},{n:113,t:"Class      = \"String\""},{n:124,t:"Class      = \"String\""},{n:165,t:"</Class>"},{n:169,t:"_DriveMng_DC062 : CLASS"},{n:187,t:"FUNCTION VIRTUAL GetBusDeviceID"},{n:192,t:"FUNCTION VIRTUAL GetDrvDeviceID"},{n:197,t:"FUNCTION VIRTUAL GLOBAL HWVersionSdias::Read"},{n:202,t:"FUNCTION VIRTUAL GLOBAL LEDControl::Read"}]},

 Description=\"Ignore axis number for SDD1X00 drive scope data request from Lasal2 for parameter S-GET2 and S-GET3.&#13;&#10;Check for error buffer or scope data request from Lasal2.&#13;&#10;Add newinst command to call methode DisableDevice() and EnableDevice() to avoid retrys when disconnected.\"/>"},{n:107,t:"<Dokumentation Revision=\"1.38\" Date=\"26.05.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added possibility to get enabled Axis which is needed to set absolute position of axis.\"/>"},{n:109,t:"<Dokumentation Revision=\"1.36\" Date=\"26.02.2015\" Author=\"PieSte\" Company=\"Sigmatek\" Description=\"Changed names of businterface commandos for new varan drive hardware.&#13;&#10;Add new businterface commando to get bus type.&#13;&#10;Changed visual state of FwNumString and FwDateString object for lse displaying.\"/>"},{n:110,t:"<Dokumentation Revision=\"1.35\" Date=\"23.01.2015\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Implemented commando for lasal 2 to get serial number of drive.&#13;&#10;On SDD210/215 the drive couldn&apos;t be initialized when only the object of the second axis was placed.\"/>"},{n:111,t:"<Dokumentation Revision=\"1.34\" Date=\"16.09.2014\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"AxIndexL2 Bits are now set only when an axis object is placed.\"/>"},{n:114,t:"<Dokumentation Revision=\"1.31\" Date=\"26.05.2014\" Author=\"PieSte\" Company=\"Sigmatek\" Description=\"Added NewInst commando for BusInterfaceSdiasDriveMng and added request for connection state.&#13;&#10;Added compatibility for CanOpen parameter.\"/>"},{n:115,t:"<Dokumentation Revision=\"1.30\" Date=\"12.02.2014\" Author=\"ZoePat&#13;&#10;ZoePat\" Company=\"Sigmatek\" Description=\"Added new NewInst comando for Lasal2 to get the list of axis.&#13;&#10;Configuration of FastAxis was stored to a wrong variable.\"/>"},{n:116,t:"<Dokumentation Revision=\"1.20\" Date=\"05.11.2012\" Author=\"RamAnd&#13;&#10;ObeChr&#13;&#10;ObeChr\" Company=\"Sigmatek\" Description=\"A timeout in the asynchronous communication was detected but not forwarded to the application&#13;&#10;In case of activated transparent mode of the drive and deactivated cyclic-task, the wrong state was shown on the server CmdState.&#13;&#10;Corrected calculation of asynchronous timeout.\"/>"},{n:119,t:"<Dokumentation Revision=\"1.14\" Date=\"13.09.2011\" Author=\"PibPet\" Company=\"Sigmatek\" Description=\"In case the CyWork of the DriveMng is being called manually, the time base of the call has to be set with the new method SetTimeBase() to calculate the correct timeout for asynchronous parameter transfer.\"/>"},{n:120,t:"<Dokumentation Revision=\"1.13\" Date=\"31.05.2011\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Corrected communication to LASAL, where a wrong length was used in the processing of command SDD_GET_PARAMS.&#13;&#10;Corrected format of firmware date and time (now 01.01.2011 09:04 instead of 1.1.2011 9:4)\"/>"},{n:122,t:"<Dokumentation Revision=\"1.11\" Date=\"30.11.2010\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"When LASAL fetches a parameter value, now this value is also refreshed on the corresponding parameter class.\"/>"}]},

{rel:"Class\\_FileSys\\_FileSys.st",name:"_FileSys.st",category:"Class",ext:".st",kb:76.7,url:"file:///C:/tmp/LSLCL2/LASAL/Class/_FileSys/_FileSys.st",hits:[{n:6,t:"<Class"},{n:20,t:"Comment            = \"System File Functions. &#10;&#10;LasalOS File Error Return Codes:&#10;*  0  NO_ERROR                        * -1  ERROR_RESERVED &#10;* -2  PARAM_ERROR                 * -3  INVALID_FILENAME &#10;* -4  DRIVE_NOT_FOUND          * -5  TOO_MANY_FILES &#10;* -6  NO_MORE_FILES               * -7  WRONG_MEDIA &#10;* -8  INVALID_FILE_SYSTEM      * -9  FILE_NOT_FOUND &#10;* -10  INVALID_FILE_HANDLE    * -11  UNSUPPORTED_DEVICE &#10;* -12  UNSUPPORTED_DRIVER_FUNCTION      * -13  CORRUPTED_PARTITION_TABLE &#10;* -14  TOO_MANY_DRIVES         * -15  INVALID_FILE_POS &#10;* -16  ACCESS_DENIED              * -17  STRING_BUFFER_TOO_SMALL &#10;* -18  GENERAL_FAILURE           * -19  PATH_NOT_FOUND &#10;* -20  FAT_ALLOC_ERROR         * -21  ROOT_DIR_FULL &#10;* -22  DISK_FULL                        * -23  TIMEOUT &#10;* -24  BAD_SECTOR                    * -25  DATA_ERROR &#10;* -26  MEDIA_CHANGED             * -27  SECTOR_NOT_FOUND &#10;* -28  ADDRESS_MARK_NOT_FOUND       * -29  DRIVE_NOT_READY &#10;* -30  WRITE_PROTECTION        * -31  DMA_OVERRUN &#10;* -32  CRC_ERROR                      * -33  DEVICE_RESOURCE_ERROR &#10;* -34  INVALID_SECTOR_SIZE     * -35  OUT_OF_BUFFERS &#10;* -36  FILE_EXISTS                       * -37  LONG_FILE_POS &#10;* -38  FILE_TOO_LARGE &#10;&#10;For more details please read the OS Interface (-&gt; _FileSys class -&gt;Appendix B) documentation!\">"},{n:33,t:"<Dokumentation Revision=\"1.20\" Date=\"2019-03-12\" Author=\"praerw\" Company=\"Sigmatek GmbH &amp; Co KG\" Description=\"Added function SFR_GetVolumeSerialNumber\"/>"},{n:34,t:"<Dokumentation Revision=\"1.19\" Date=\"2017-03-15\" Author=\"schsas\" Company=\"Sigmatek GmbH &amp; Co KG\" Description=\"Check function RemoveDirectory_Full and RemoveDirectory_Full_A on NULL\"/>"},{n:40,t:"<Dokumentation Revision=\"1.13\" Date=\"2012-11-16\" Author=\"kiltob\" Company=\"Sigmatek GmbH &amp; Co KG\" Description=\"Added method SplitNameExtensionToNameAndExtension\"/>"},{n:43,t:"</Class>"},{n:45,t:"_FileSys : CLASS"},{n:133,t:"FUNCTION _FileSys"},{n:137,t:"//! <Function Comment=\"This function opens a file on a local drive.\" Name=\"FileOpen\"/>"},{n:138,t:"FUNCTION __CDECL VIRTUAL GLOBAL FileOpen"},{n:141,t:"attributes 	: UDINT;			//! <Variable Comment=\"The attributes can be a combination of: &#10;* ATT_READ_WRITE &#10;* ATT_READ_ONLY &#10;* ATT_OPEN_SHARED &#10;* ATT_OPEN_NO_DIR &#10;* ATT_OPEN_DIR &#10;* ATT_CREATE &#10;* ATT_CREATE_ALWAYS &#10;* ATT_COMMITTED &#10;* ATT_CACHE_DATA &#10;* ATT_LAZY_DATA&#10;&#10; For more details please read the OS Interface (-&gt; _FileSys Class -&gt; Appendix B) documentation!\" Name=\"FileOpen.attributes\"/>"},{n:144,t:"handle (EAX) 	: DINT;			//! <Variable Comment=\"If the function succeeds, the return value is a file handle for the opened file and the file pointer of the file is set to 0. If the return value is less than 0, the function has failed and the return value is the error code. For the possible &apos;Error Codes&apos;, read the _FileSys class comment.\" Name=\"FileOpen.handle\"/>"},{n:146,t:"//! <Function Comment=\"This function reads data from a file.&#13;&#10;Use FileReadV1 instead to get a signed return value. \" Name=\"FileRead\"/>"},{n:147,t:"FUNCTION __CDECL VIRTUAL GLOBAL FileRead"},{n:154,t:"read (EAX) 	: UDINT;			//! <Variable Comment=\"Reading past the end of file is not regarded as an error. &#13;&#10;If the function returns a value less than the read size, then probably the end of the file was encountered.&#13;&#10;If the function succeeds, the return value is the value of read bytes. &#13;&#10;If the function fails, the return value is zero.\" Name=\"FileRead.read\"/>"},{n:156,t:"//! <Function Comment=\"This function writes data to a file.\" Name=\"FileWrite\"/>"},{n:157,t:"FUNCTION __CDECL VIRTUAL GLOBAL FileWrite"},{n:164,t:"written (EAX) 	: DINT;			//! <Variable Comment=\"Writing past the current end of file will automatically extend the file. &#10;When the file size exceeds the current allocated file size, new clusters are allocated for the file. The FileSystem will allocate new clusters immediately following the current last cluster, if possible. &#10;&#10;If the function succeeds, the return value is the count of written bytes. If the function fails, the return value is a negative error code. For the possible &apos;Error Codes&apos;, read the _FileSys class comment.\" Name=\"FileWrite.written\"/>"},{n:166,t:"//! <Function Comment=\"This function closes an open file.\" Name=\"FileClose\"/>"},{n:167,t:"FUNCTION __CDECL VIRTUAL GLOBAL FileClose"},{n:171,t:"//! <Function Comment=\"This function deletes a file.\" Name=\"FileDelete\"/>"},{n:172,t:"FUNCTION __CDECL VIRTUAL GLOBAL FileDelete"},{n:177,t:"retval (EAX) 	: DINT;			//! <Variable Comment=\"If the function succeeds, the return value is 0. If the function fails, the return value is a negative error code. For the possible &apos;Error Codes&apos;, read the _FileSys class comment.\" Name=\"FileDelete.retval\"/>"},{n:179,t:"//! <Function Comment=\"FileLSeek repositions a file pointer and possibly extends a file.&#13;&#10;Use FileLSeekV1 instead to get a signed return value. \" Name=\"Filelseek\"/>"},{n:180,t:"FUNCTION __CDECL VIRTUAL GLOBAL Filelseek"}]},

ation DATA memory area.\" Name=\"GetDataMemoryAddress\"/>"},{n:109,t:"FUNCTION __CDECL VIRTUAL GLOBAL GetDataMemoryAddress"},{n:113,t:"//! <Function Comment=\"This function is called to return the starting address of the Lasal application CODE memory area.\" Name=\"GetCodeMemoryAddress\"/>"},{n:114,t:"FUNCTION __CDECL VIRTUAL GLOBAL GetCodeMemoryAddress"},{n:118,t:"//! <Function Comment=\"This function is called to return the current project state ENUM value as follows: &#10; PRJ_ISNOTAVAIL: No project is currently loaded. &#10; PRJ_ISEXE: Project is an EXE project and is ready. &#10; PRJ_ISNOTLINKED: Modular project is not linked (error condition) &#10; PRJ_ISLINKED: Modular project loaded and ready.\" Name=\"GetProjectState\"/>"},{n:119,t:"FUNCTION __CDECL VIRTUAL GLOBAL GetProjectState"},{n:121,t:"state (AX) 	: LSLLNK_ProjectState;"},{n:123,t:"//! <Function Comment=\"This function is called to get the CRC32 checksum of a Lasal application module by its module ID.\" Name=\"GetChksumByModulID\"/>"},{n:124,t:"FUNCTION __CDECL VIRTUAL GLOBAL GetChksumByModulID"}]},

ntrol&#13;&#10;around this for reading and updating\" Name=\"SetAxisFlgs\"/>"},{n:77,t:"FUNCTION VIRTUAL GLOBAL SetAxisFlgs"},{n:87,t:"FUNCTION @STD"},{n:91,t:"FUNCTION GLOBAL TAB @CT_;"},{n:100,t:"FUNCTION GLOBAL TAB _LMCABSEncoder::@CT_"},{n:105,t:"TO_UDINT(3162349954), \"_LMCABSEncoder\", //Class"},{n:127,t:"FUNCTION _LMCABSEncoder::@STD"},{n:135,t:"//Command Methods"}]},
{rel:"Class\\_LMCAxis\\_LMCAxis.st",name:"_LMCAxis.st",category:"Class",ext:".st",kb:112.8,url:"file:///C:/tmp/LSLCL2/LASAL/Class/_LMCAxis/_LMCAxis.st",hits:[{n:6,t:"<Class"},{n:21,t:"IconPath           = \".\\Class\\_LMCAxis\\LMCAxis.ico\""},{n:24,t:"Comment            = \"The _LMCAxis class represents a profile generator for 1 axis. It calculates the actual &#13;&#10;set position and provides with the set and actual values to the controller class.&#13;&#10;&#13;&#10;The _LMCAxis class also contains all the functions/interfaces needed to drive an axis.&#13;&#10;&#13;&#10;The _LMCAxis class also provides the standard referencing functions for the axis. The&#13;&#10;most common referencing variations can be preformed.&#13;&#10;&#13;&#10;The _LMCAxis class also monitors the hardware limit switches.&#13;&#10;&#13;&#10;The _LMCAxis class can manage absolute value encoders.\">"},{n:47,t:"<File Path=\".\\Class\\_LMCAxis\\_LMCAxis.vov\"/>"},{n:52,t:"<Dokumentation Revision=\"1.85\" Date=\"2018-09-04\" Author=\"SatChr\" Company=\"Sigmatek\" Description=\"1. Improvement: Additional parameters in SetAdjustement and Read/SetParameter added.&#13;&#10;2. Bugfix: CalcMovingTime has returned wrong values, if MoveType=_JERK_PROFILE and if the programmed, maximum velocity may have not been reached.&#13;&#10;3. Bugfix: Method ReadUserData returns an initialized value 0 in case of an invalid input parameter index.\"/>"},{n:53,t:"<Dokumentation Revision=\"1.84\" Date=\"2018-08-13\" Author=\"SatChr\" Company=\"Sigmatek\" Description=\"1. Bugfix: Avoid access exception, if coupling to a master axis immediately after an error occured at the master. (Bug occured, only if ErroConfig.CoupleMonitoring=1)&#13;&#10;2. Bugfix: Avoid division error in StopMove, if the neccessary deceleration value to stop before a software limit does not fit into a DINT variable. (MoveType=_RAMP_PROFILE or _SCURVE_PROFILE)\"/>"},{n:54,t:"<Dokumentation Revision=\"1.83&#13;&#10;\" Date=\"2018-06-14\" Author=\"RodMar&#13;&#10;SatChr\" Company=\"Sigmatek\" Description=\"1. Bugfix: Correction of stopping point computation for coupled axis with software limits.&#13;&#10;2. Bugfix: Faster coupling movement to a stillstanding master (MoveType RAMP &amp; SCURVE)&#13;&#10;3. Bugfix: cam coupling with a non-modulo slave: Correction of the maxmodulo overflow handling in negative direction.&#13;&#10;4. Improvement: New method QuickStop added.&#13;&#10;5. PowerOff() Function will not enter WAITPASSIVE_AXIS if the controller is already powered off\"/>"},{n:55,t:"<Dokumentation Revision=\"1.82\" Date=\"2018-03-23\" Author=\"HasHan&#13;&#10;SatChr\" Company=\"Sigmatek\" Description=\"1. Bugfix: CoupleGearPolynom: Cleaner, smoother movement, if the master axis is accelerating or braking.\"/>"},{n:57,t:"<Dokumentation Revision=\"1.80\" Date=\"2017-09-28\" Author=\"Roskri\" Company=\"Sigmatek\" Description=\"Bugfix: Axis will now not, for one cycle, uncouple during certain movements when coupled to a _LMCProfile.\"/>"},{n:58,t:"<Dokumentation Revision=\"1.79\" Date=\"2017-09-14\" Author=\"HasHan&#13;&#10;PalHar&#13;&#10;SatChr\" Company=\"Sigmatek\" Description=\"1. Bugfix: the position-drift is now corrected, if the master is not constant during PosMode = _StartPolynomPositioning&#13;&#10;2. Bugfix: MoveType=_JERK_PROFILE: Improvement of couple algorithm, such that the axis may not loose synchronisity (MasterLock), if not really necessary.&#13;&#10;3. Bugfix: Calculating an exact ramp for StopMove makes correct end position.\"/>"},{n:61,t:"<Dokumentation Revision=\"1.76\" Date=\"2017-04-03\" Author=\"HasHan&#13;&#10;PalHar\" Company=\"Sigmatek\" Description=\"1. Improvement: add the server InitDone that the VoV works without error in offline-mode&#13;&#10;2. Improvement: an axis coupled by CoupleGearVelocity() will now reach the SWLimits like expected&#13;&#10;3. Bugfix: correct last move-step if an unlocked axis is stopped&#13;&#10;4. Bugfix: CalcSpeedChangePath() delivers also in coupled-mode the correct distance&#13;&#10;5. Improvement: the PowerOn-Timeout can be changed with SetParameter(LMCAXIS_PAR_SET_POWERON_TIMEOUT) default (90sec)\"/>"},{n:62,t:"<Dokumentation Revision=\"1.75\" Date=\"2017-03-17\" Author=\"FucHer&#13;&#10;SatChr\" Company=\"Sigmatek\" Description=\"1. Bugfix: CalcBrakePosition(), _JERK_PROFILE: limit the master speed and acceleration before calculating the brake distance.&#13;&#10;   _RAMP_PROFILE, _SCURVE_PROFILE: limit the master speed before calculating the brake distance.&#13;&#10;2. Bugfix: Improvement of the coupling process, if the slave axis has been waiting for the master axis at its software limit position and the master axis is approaching the valid range.\"/>"},{n:64,t:"<Dokumentation Revision=\"1.73\" Date=\"2017-01-27\" Author=\"Roskri&#13;&#10;SatChr\" Company=\"Sigmatek\" Description=\"1. Bugfix: When SetParameter(LMCAXIS_PAR_SET_SHAPE_SPLINE) with mode = 6 is set, the slave is decoupled when it reaches its synchronized state with Master by coupling with CoupleGearPolynom.&#13;&#10;2. Bugfix: Move_Type = _JERK_PROFILE: the set position makes a jump when a brake correction is made but axis is already braking with maximum deceleration.&#13;&#10;3. Improvement: New mode for bit AxisStatus.DelayedMasterLock (SetParameter(LMCAXIS_PAR_SET_DELAYEDMASTERLOCK_WINDOW). DelayedMasterLock bit is set, if the position and velocity is in a window.&#13;&#10;4. Improvement: new mode WAITPASIVE_LMCAXIS if DrivePosControl is connected&#13;&#10;5. Improvement: AxisStatus.ReadyForPowerOn is 1 if HWReady and _DriveAxis.StateWord.SwitchedOn = 1\"/>"},{n:67,t:"<Dokumentation Revision=\"1.70\" Date=\"2016-10-14\" Author=\"SatChr\" Company=\"Sigmatek\" Description=\"1. Bugfix: Method QuitError does not reset AxisError flags, which will be set in the next realtime cycle again.&#13;&#10;2. Bugfix: A small discrepancy between the internal, ramped position and the s-curve-filtered position can occur for an endless axis with MoveType=_SCURVE_PROFILE, if a lot of MaxModulo overflows happens.&#13;&#10;3. Bugfix: AxisError.PowerOnError is not set any longer, if the axis was shut of by a contouring error.&#13;&#10;4. Bugfix: GetPosInfoBeforeRampDown returns 1, if the movement is already finished. Minus 1, if the axis is in wrong state (PASSIVE, ERROR. LOCKED).&#13;&#10;5. Improvement: New ReadPosition mode LMCAXIS_XW_TO_DESTPOS_INTUNIT.&#13;&#10;6. Improvement: New ReadVelocity mode LMCAXIS_CMDVEL_APPUNIT.&#13;&#10;7. Bugfix: Very small velocities work with EDGE2 technology and MoveType=_RAMP_PROFILE or _SCURVE_PROFILE.&#13;&#10;8. Bugfix: With MoveType=_RAMP_PROFILE or _SCURVE_PROFILE and EDGE2-CPUs: Move commands with a programmed velocity less than 1 internal unit per tick did not work.\"/>"},{n:68,t:"<Dokumentation Revision=\"1.69\" Date=\"2016-08-26\" Author=\"SatChr\" Company=\"Sigmatek\" Description=\"Bugfix: MoveType=_JERK_PROFILE: In very rare cases, it may have happend, that a slave axis did not get synchron with its stillstanding master axis, but just swing very small around the target.\"/>"},{n:69,t:"<Dokumentation Revision=\"1.68\" Date=\"2016-06-08\" Author=\"SatChr\" Company=\"Sigmatek\" Description=\"changes in base class\"/>"},{n:70,t:"<Dokumentation Revision=\"1.67\" Date=\"2016-05-18\" Author=\"SatChr\" Company=\"Sigmatek\" Description=\"changes in base class\"/>"},{n:71,t:"<Dokumentation Revision=\"1.66\" Date=\"2016-05-03\" Author=\"SatChr\" Company=\"Sigmatek\" Description=\"changes in base class\"/>"},{n:72,t:"<Dokumentation Revision=\"1.65\" Date=\"2016-04-06\" Author=\"SatChr&#13;&#10;PalHar&#13;&#10;HasHan&#13;&#10;Roskri\" Company=\"Sigmatek\" Description=\"1. changes in base class&#13;&#10;2. Improvement: New input parameter Jerk for all move commands added.&#13;&#10;3. Improvement: new method ReadParameterLREAL added.\"/>"},{n:73,t:"<Dokumentation Revision=\"1.63\" Date=\"2016-03-14\" Author=\"SatChr&#13;&#10;HasHan\" Company=\"Sigmatek\" Description=\"1. Improvement: New method ReadSlavePosCam added.&#13;&#10;2. changes in base class and _LMCSafety\"/>"},{n:74,t:"<Dokumentation Revision=\"1.62\" Date=\"2016-03-01\" Author=\"HasHan\" Company=\"Sigmatek\" Description=\"change in base class\"/>"},{n:76,t:"<Dokumentation Revision=\"1.60\" Date=\"2016-01-26\" Author=\"SatChr\" Company=\"Sigmatek\" Description=\"changes in base class\"/>"},{n:77,t:"<Dokumentation Revision=\"1.59\" Date=\"2015-10-01\" Author=\"SatChr\" Company=\"Sigmatek\" Description=\"1. changes in base class&#13;&#10;2. Improvement: New method CalcSpeedChangePath added.\"/>"},{n:79,t:"<Dokumentation Revision=\"1.57\" Date=\"2015-09-25\" Author=\"FucHer&#13;&#10;SatChr\" Company=\"Sigmatek\" Description=\"1. changes in base class\"/>"},{n:80,t:"<Dokumentation Revision=\"1.56\" Date=\"2015-06-24\" Author=\"FucHer&#13;&#10;PalHar&#13;&#10;SatChr\" Company=\"Sigmatek\" Description=\"changes in base class\"/>"}]},
{rel:"Class\\_LMCAxisBase\\_LMCAxisBase.st",name:"_LMCAxisBase.st",category:"Class",ext:".st",kb:1783,url:"file:///C:/tmp/LSLCL2/LASAL/Class/_LMCAxisBase/_LMCAxisBase.st",hits:[{n:119,t:"#include \"..\\..\\Class\\_LMCAxisBase\\C_MathAxis.h\""},{n:120,t:"#include \"..\\..\\Class\\_LMCAxisBase\\_LMCTraceView.h\""},{n:123,t:"<Class"},{n:138,t:"IconPath           = \".\\Class\\_LMCAxisBase\\LMCAxis.ico\""},{n:141,t:"Comment            = \"The _LMCAxisBase class represents a profile generator for 1 axis. It calculates the actual &#13;&#10;set position and provides with the set and actual values to the controller class.&#13;&#10;&#13;&#10;The _LMCAxisBase class also contains all the functions/interfaces needed to drive an axis.&#13;&#10;&#13;&#10;\">"},{n:143,t:"<Server Name=\"ActPos\" GUID=\"{864367D4-AA4F-4D63-B05E-6A13737A7360}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"false\" Retentive=\"false\" Comment=\"Actual position of the axis [Application units]&#13;&#10;&#13;&#10;The Write methode will call a SetPostion() command.\"/>"},{n:147,t:"<Server Name=\"AxisError\" GUID=\"{D915F1B2-0033-45ED-95CD-98E5AC15454C}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Errorflags of the axis&#13;&#10;=====================&#13;&#10;&#13;&#10;Bit 1: HwError&#13;&#10;Set if a general Hardware-error occured&#13;&#10;&#13;&#10;Bit 2: SwMinError&#13;&#10;Set if the Software endswitch minimum active&#13;&#10;&#13;&#10;Bit 3: SwMaxError&#13;&#10;Set if the Software endswitch maximum active&#13;&#10;&#13;&#10;Bit 4: HwMinError&#13;&#10;Set if the minimal-position of the hardware is invalid &#13;&#10;&#13;&#10;Bit 5: HwMaxError&#13;&#10;Set if the maximal-position of the hardware is invalid &#13;&#10;&#13;&#10;Bit 6: ReferenceError&#13;&#10;Set if an error occurred during the reference-run&#13;&#10;&#13;&#10;Bit 7: ContouringError&#13;&#10;Set if a tracking error occured&#13;&#10;&#13;&#10;Bit 8: ActPosError&#13;&#10;Set if the position of the hardware is invalid &#13;&#10;&#13;&#10;Bit 9: AbsOffsetError&#13;&#10;AxisError.AbsOffsetError&#13;&#10;&#13;&#10;Bit 10: OverFlowError&#13;&#10;Set if a Position-overflow occured&#13;&#10;&#13;&#10;Bit 11 EmergencyError&#13;&#10;Set if the _LMCSafety.Emergency is active&#13;&#10;&#13;&#10;Bit 12 ResolutionError&#13;&#10;Set if the Resolution causes an overflow error&#13;&#10;&#13;&#10;Bit 13, 14, 15&#13;&#10;Unsused&#13;&#10;&#13;&#10;Bit 16: GlobErr&#13;&#10;Set if some global error is active&#13;&#10;\"/>"},{n:154,t:"<Server Name=\"JMax\" GUID=\"{F40EF8AA-6964-4819-9DA6-F1FBB2CBF180}\" Visualized=\"true\" Initialize=\"true\" DefValue=\"0\" WriteProtected=\"false\" Retentive=\"File\" Comment=\"Defines the maximal jerk of the axis [Application units / sec^3 / 1000]&#13;&#10;&#13;&#10;for MoveType=_JERK_PROFILE only&#13;&#10;&#13;&#10;If this value equals 0, then the maximal jerk is computed by Amax / TJerk.\"/>"},{n:155,t:"<Server Name=\"Modulo\" GUID=\"{384697FA-6383-4042-B2B5-869B06B81AC4}\" Visualized=\"true\" Initialize=\"true\" DefValue=\"0\" WriteProtected=\"false\" Retentive=\"File\" Comment=\"Modulo value of the axis [Application units]. If the value is &lt;&gt; 0, the actual position is converted &#13;&#10;to a modulo position using the Modulo function.&#13;&#10;The server must be initialized.\"/>"},{n:156,t:"<Server Name=\"MoveType\" GUID=\"{69DE3781-2054-4C7E-94C1-D8816EBD029B}\" Visualized=\"true\" Initialize=\"true\" DefValue=\"_RAMP_Profile\" WriteProtected=\"false\" Retentive=\"File\" Comment=\"Moving profile of the axis&#13;&#10;_RAMP_PROFILE - axis moves without jerk limitation&#13;&#10;_SCURVE_PROFILE - jerk limitation through position filtering&#13;&#10;_JERK_PROFILE - jerk limitation through computed trapezoid acceleration/deceleration&#13;&#10;The server must be initialized.\"/>"},{n:157,t:"<Server Name=\"Override\" GUID=\"{FF96B1A2-F449-4E94-BD43-CD91AB79A05F}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"false\" Retentive=\"false\" Comment=\"The override is a percentage reduction of the assigned speed &#13;&#10;for the actual motion command. (1000 = 100.0%).\"/>"},{n:158,t:"<Server Name=\"PosMode\" GUID=\"{CDFCD1F3-6AB5-4624-A6A9-C75262DE1C51}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Positioning mode of the axis&#13;&#10;==================&#13;&#10;&#13;&#10;_Positioning&#13;&#10;The Axis is not coupled and acts depending on a command defined by the user&#13;&#10;&#13;&#10;&#13;&#10;_NCPositioning&#13;&#10;The Axis is not coupled and acts depending on a command defined by the user&#13;&#10;&#13;&#10;&#13;&#10;_StdSyncPositioning&#13;&#10;The slave-axis couples onto a master-axis in some standard-mode&#13;&#10;&#13;&#10;&#13;&#10;_UserSyncPositioning&#13;&#10;The slave-axis couples a position defined by the user to the master-axis&#13;&#10;&#13;&#10;&#13;&#10;_CAMSyncPositioning&#13;&#10;The slave-axis couples onto a master-axis by means of a user-defined curve&#13;&#10;&#13;&#10;&#13;&#10;_ProfileSyncPositioning&#13;&#10;The axis couples on a disk-table&#13;&#10;&#13;&#10;&#13;&#10;_SyncVelocity&#13;&#10;The slave-axis couples its speedrate to the master-axis&#13;&#10;&#13;&#10;&#13;&#10;_StartPolynomPositioning&#13;&#10;The slave-axis links up to a master-axis by means of splines&#13;&#10;&#13;&#10;&#13;&#10;_SyncPolynomPositioning&#13;&#10;The salve-axis is coupled onto a master-axis by means of splines\"/>"},{n:160,t:"<Server Name=\"SetPos\" GUID=\"{A24425E6-4E11-412C-83A7-960537ADB33E}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"false\" Retentive=\"false\" Comment=\"Actual calculated position set value of the axis [application units].&#13;&#10;&#13;&#10;The Write methode will call a SetPostion() command.\"/>"},{n:161,t:"<Server Name=\"SetVelocity\" GUID=\"{7691CDA2-0D42-445A-8364-865F948A8BAB}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Actual calculated speed set value of the axis [Application units/s].\"/>"},{n:162,t:"<Server Name=\"SimulateMode\" GUID=\"{22BE35A3-9C0D-4FF6-B5E2-4ECB033D46B6}\" Visualized=\"true\" Initialize=\"true\" DefValue=\"0\" WriteProtected=\"false\" Retentive=\"false\" Comment=\"activate (1) / deactivate (0) a simulation mode (virtual axis mode) &#13;&#10;during the application runs.&#13;&#10;The server must be initialized.&#13;&#10;\"/>"},{n:163,t:"<Server Name=\"SWMaxPos\" GUID=\"{BDE8F6A7-C046-4CA2-BA01-A8416D226E14}\" Visualized=\"true\" Initialize=\"true\" DefValue=\"0\" WriteProtected=\"false\" Retentive=\"File\" Comment=\"Maximum software end position [Application units].&#13;&#10;&#13;&#10;To deactivate SW-Limit, set value which is bigger than MaxModulo.&#13;&#10;&#13;&#10;Value can be set if Axis is disabled.\"/>"},{n:164,t:"<Server Name=\"SWMinPos\" GUID=\"{61F22F0F-46A7-49AA-A29C-03B86C420418}\" Visualized=\"true\" Initialize=\"true\" DefValue=\"0\" WriteProtected=\"false\" Retentive=\"File\" Comment=\"Minimum software end position [Application units].&#13;&#10;&#13;&#10;To deactivate SW-Limit, set value which is smaller than -MaxModulo.&#13;&#10;&#13;&#10;Value can be set if Axis is disabled.\"/>"},{n:165,t:"<Server Name=\"Tjerk\" GUID=\"{57A5493C-1735-4622-BB13-42B699CCBC9D}\" Visualized=\"true\" Initialize=\"true\" DefValue=\"0\" WriteProtected=\"false\" Retentive=\"File\" Comment=\"Time for the acceleration to attain its maximum value [ms]&#13;&#10;&#13;&#10;The meaning of this value depends on the server MoveType:&#13;&#10;_RAMP_PROFILE: no effect&#13;&#10;_SCURVE_PROFILE: filter size for the SCURVE buffer&#13;&#10;_JERK_PROFILE: If the server JMax=0, then this value defines the maximal jerk of the axis by AMax / TJerk. &#13;&#10;               Otherwise, if JMax&lt;&gt;0, then this value has no effect.\"/>"},{n:166,t:"<Server Name=\"VMax\" GUID=\"{26F9E93C-F21E-4BA6-AED9-4EF7C79E11F7}\" Visualized=\"true\" Initialize=\"true\" DefValue=\"5m\" WriteProtected=\"false\" Retentive=\"File\" Comment=\"Maxmimum speed of the axis [Application units / s]&#13;&#10;The server must be initialized.\"/>"},{n:167,t:"<Client Name=\"ActPosition\" Required=\"false\" Internal=\"false\" Comment=\"With this client, the actual position is read and converted to application units.&#13;&#10;If no connection is available, the _LMCAxisBase object operates as a virtual axis.&#13;&#10;This means that the calculated set value is also the actual position.\"/>"},{n:171,t:"<Client Name=\"LMCPostRtWorkTrigger\" Required=\"false\" Internal=\"false\" Comment=\"With this client, a connection to a user class can be established so &#13;&#10;that it can run with the same task time as the application. Over this &#13;&#10;client, the RtWork method of a user class is called as the last task in RtWork.\"/>"},{n:172,t:"<Client Name=\"LMCPreRtWorkTrigger\" Required=\"false\" Internal=\"false\" Comment=\"With this client, a connection to a user class can be established so &#13;&#10;that it can run with the same task time as the application. Over this &#13;&#10;client, the RtWork method of a user class is called as first Task in RtWork.\"/>"},{n:174,t:"<Client Name=\"LMCReference\" Required=\"false\" Internal=\"false\" Comment=\"This client is used for communication between the reference class (RefStandaard) &#13;&#10;and the profile generator (_LMCAxisBase).\"/>"},{n:175,t:"<Client Name=\"LMCSafety\" Required=\"false\" Internal=\"false\" Comment=\"Connection to an object of the class _WatchProtCubes. With this connection, a safety zone monitor is activated for linear movements\"/>"},{n:181,t:"<File Path=\".\\Class\\_LMCAxisBase\\C_MathAxis.h\" Include=\"true\"/>"}]},

{rel:"Class\\_TaskObjectControl\\_TaskObjectControl.st",name:"_TaskObjectControl.st",category:"Class",ext:".st",kb:18.8,url:"file:///C:/tmp/LSLCL2/LASAL/Class/_TaskObjectControl/_TaskObjectControl.st",hits:[{n:6,t:"<Class"},{n:31,t:"</Class>"},{n:33,t:"_TaskObjectControl : CLASS"},{n:73,t:"FUNCTION _TaskObjectControl"},{n:77,t:"//! <Function Comment=\"This function reads statistic information about a Lasal Object, situated in RT-, CT-, or BG-Work.\" Name=\"GetObjectInfo\"/>"},{n:78,t:"FUNCTION __CDECL VIRTUAL GLOBAL GetObjectInfo"},{n:81,t:"tasktype 	: USINT;			//! <Variable Comment=\"Parameter TaskType specifies in which task list the object should be searched. A combination of task types is not possible, for objects that run i.e. both RT- &amp; CT-Work, the function has to be called for each task type.\" Name=\"GetObjectInfo.tasktype\"/>"},{n:85,t:"retval (EAX) 	: DINT;			//! <Variable Comment=\"If the function succeeds, the object is found, ZERO is returned and Parameter ObjInfo is filled. &#10;If the function fails, a negative error-code is returned: &#10;  -1   no application &#10;  -5   object not found &#10;  -3   wrong task type\" Name=\"GetObjectInfo.retval\"/>"},{n:88,t:"FUNCTION __CDECL VIRTUAL GLOBAL ChangeObjectState"},{n:97,t:"retval (EAX) 	: DINT;			//! <Variable Comment=\"If the function succeeds, it returns ZERO and the action was successful. &#10;&#10;If the function fails, a negative error-code is returned. &#10;Return Values: &#10;  -1  wrong task type / internal error &#10;  -2  no application &#10;  -4  could not add object to list &#10;  -5  object not found\" Name=\"ChangeObjectState.retval\"/>"},{n:99,t:"//! <Function Comment=\"This function deletes an object from the update list and puts it into a suspend respectively backup list. When an object is in an update list, it is executed and when an object is in a suspend/backup list, its execution is suspended.\" Name=\"BackUpObject\"/>"},{n:100,t:"FUNCTION __CDECL VIRTUAL GLOBAL BackUpObject"},{n:106,t:"retval (EAX) 	: DINT;			//! <Variable Comment=\"If the function succeeds, it returns ZERO and the object is in the specified backup list. The object can be restored using the function &apos;RestoreObject&apos;. &#10;&#10;If the function fails, a negative error code is returned. &#10;Return Values: &#10;  -1   wrong task type &#10;  -2   wrong object type &#10;  -5   object not found\" Name=\"BackUpObject.retval\"/>"},{n:108,t:"//! <Function Comment=\"This function restores an object from the backup list and puts it back into the update list.\" Name=\"RestoreObject\"/>"},{n:109,t:"FUNCTION __CDECL VIRTUAL GLOBAL RestoreObject"},{n:115,t:"retval (EAX) 	: DINT;			//! <Variable Comment=\"If the function succeeds, it returns ZERO and the object is restored. &#10;&#10;If it fails, a negative error code is returned. &#10;Return Values: &#10;  -1   wrong task type &#10;  -2   wrong object type &#10;  -3   list inserting failed &#10;  -5   object not found\" Name=\"RestoreObject.retval\"/>"},{n:117,t:"//! <Function Comment=\"This function installs a cyclic user-function.\" Name=\"AddCyclicFunction\"/>"},{n:118,t:"FUNCTION __CDECL VIRTUAL GLOBAL AddCyclicFunction"},{n:120,t:"pFunction 	: pVoid;			//! <Variable Comment=\"Parameter pFunction points to the function to install.\" Name=\"AddCyclicFunction.pFunction\"/>"},{n:121,t:"pParam 	: pVoid;			//! <Variable Comment=\"Parameter pParam points to a user-defined parameter that is passed to the function on its call.\" Name=\"AddCyclicFunction.pParam\"/>"},{n:127,t:"objhandle (EAX) 	: pVoid;			//! <Variable Comment=\"If the function succeeds, it returns a handle of the installed cyclic-function (which is merely the malloc pointer of the new list-object), and the object will be updated as demanded. If it fails, it returns NIL.\" Name=\"AddCyclicFunction.objhandle\"/>"},{n:129,t:"//! <Function Comment=\"This function installs a cyclic object.\" Name=\"AddCyclicObject\"/>"},{n:130,t:"FUNCTION __CDECL VIRTUAL GLOBAL AddCycli {rel:"Class\\ASCII_BIN\\ASCII_BIN.st",name:"ASCII_BIN.st",category:"Class",ext:".st",kb:31.2,url:"file:///C:/tmp/LSLCL2/LASAL/Class/ASCII_BIN/ASCII_BIN.st",hits:[{n:6,t:"<Class"},{n:18,t:"IconPath           = \".\\Class\\ASCII_BIN\\convert.ICO\""},{n:23,t:"<Server Name=\"Obj_channel\" GUID=\"{AA790E5E-E4EC-4B0F-80BB-3FC837048BBA}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"you can call the method Ascii2Bin, Bin2Ascii, Ascii2udBin or udBin2Ascii\"/>"},{n:28,t:"<Dokumentation Revision=\"1.20\" Date=\"2013-07-12\" Author=\"spimar\" Company=\"Sigmatek\" Description=\"- complemented method comments&#13;&#10;- ARM ready&#13;&#10;- Fixed a bug in Ascii2Bin() to be able to convert a full DINT value;&#13;&#10;- Now it is possible to convert a unrestricted number of characters (Ascii2Bin, Ascii2udBin). &#13;&#10;- If the number of characters doesn’t fit into the datatype(DINT, UDINT), an errorbit is set and the value is cut off at the last character which fits into the datatype;\"/>"},{n:32,t:"<Dokumentation Revision=\"1.7\" Date=\"2011-08-08\" Author=\"FesGue\" Company=\"Sigmatek\" Description=\"Function ASCII2BIN and ASCII2udBIN returns wrong number of digits\"/>"},{n:39,t:"</Class>"},{n:41,t:"ASCII_BIN : CLASS"},{n:47,t:"//! <Function Comment=\" *************************************************************************&#13;&#10;                BIN to ASCII converter&#13;&#10;  The input variables of this function have to be a&#13;&#10;  pointer  on a  Char-String, the value you want to convert(DINT)&#13;&#10;  and a scheme(BINT). In the scheme you must define the number&#13;&#10; of digits to convert, the position of the decimal point,&#13;&#10; hasty zeros or not and if the descendant zeros should be&#13;&#10; deleted or not.&#13;&#10; -------------scheme------------------------------&#13;&#10;       xxxx xx00 0000 0000&#13;&#10;       .... .... .... **** no. of digits&#13;&#10;       .... .... **** ....    pos. of decimal point (from lowest sign.)&#13;&#10;       .... ...* .... ....    reminding digits fill with hasty zeros&#13;&#10;   .... ..*. .... .... delete descendant zeros&#13;&#10;&#13;&#10;     16#0224$BINT&#13;&#10;       |||........   no. of digits&#13;&#10;       ||.........   pos. of decimal point&#13;&#10;        |..........   0 without hasty zeros&#13;&#10;                      1 with hasty zeros&#13;&#10;                     2 delete descendant zeros (the&#13;&#10;         digits have to be the real number&#13;&#10;         of digits, without the deleted&#13;&#10;         zeros! f.e.: &#13;&#10;         12.900 =&gt; 12.9 that means 3 digits!)&#13;&#10;&#13;&#10; If an error occures during the conversion, the first CHAR in&#13;&#10; your string will be set to &apos;?&apos; (this f.e. could be the result&#13;&#10;  of a wrong number of digits). The status of all other CHAR in&#13;&#10; the String is undefined!&#13;&#10; *************************************************************************&#13;&#10;    created   :   MS    :     KW 12/02&#13;&#10; *************************************************************************&#13;&#10;                    operation of BIN2ASCII function&#13;&#10; *************************************************************************&#13;&#10;&#13;&#10; *************************************************************************&#13;&#10;                BIN to ASCII Konverter&#13;&#10;  &#13;&#10;  Übergeben Sie der Funktion einen Pointer auf ein CHAR-Feld, die&#13;&#10; Zahl die in ASCII gewandelt werden soll (vom Typ DINT) und das&#13;&#10; Format nach welchem die Zahl gewandelt wird. Im Format muss&#13;&#10; folgendes angegeben werden: die Anzahl der Stellen, die &#13;&#10;  Position des Kommas, ob Vornullen verwendet werden und ob &#13;&#10; Nachnullen gelöscht werden sollen. &#13;&#10; -------------Format------------------------------&#13;&#10;       xxxx xx00 0000 0000&#13;&#10;       .... .... .... **** Anz. der Stellen&#13;&#10;       .... .... **** ....    pos. des Komma (von hinten)&#13;&#10;       .... ...* .... ....    restlichen Stellen mit Vornullen auffüllen&#13;&#10;   .... ..*. .... .... Nachnullen löschen&#13;&#10;&#13;&#10;     16#0224$BINT&#13;&#10;       |||........   Anz. der Stellen&#13;&#10;       ||.........   pos. des Komma (von hinten)&#13;&#10;        |..........   0 ohne Vornullen&#13;&#10;                      1 mit Vornullen auffüllen&#13;&#10;                     2 Nachnullen löschen (die Anz. der&#13;&#10;         Stellen muss genau der Anz. der&#13;&#10;         Gewandelten entsprechen, ohne &#13;&#10;         Nachnullen! z.B.:&#13;&#10;         12.900 =&gt; 12.9 d.h. 3 Stellen!)  &#13;&#10; Wenn bei der Wandlung ein Fehler aufgetreten ist, wir das &#13;&#10; erste Zeichen im CHAR-String auf &apos;?&apos; gesetzt (könnte z.B.&#13;&#10;  durch eine falsche Anzahl Stellen auftreten). Alle Anderen&#13;&#10; haben einen nicht definierten Zustand!&#13;&#10; *************************************************************************&#13;&#10;    erstellt   :   MS    :     KW 12/02&#13;&#10; *************************************************************************&#13;&#10;                    operation of BIN2ASCII function&#13;&#10; *************************************************************************&#13;&#10;[&gt;pt]Pointer auf CHAR-String&#13;&#10;[&gt;value]zu konvertierende Zahl&#13;&#10;[&gt;format]das Format&#13;&#10;\" Name=\"Bin2Ascii\"/>"},{n:48,t:"FUNCTION VIRTUAL GLOBAL Bin2Ascii"},{n:55,t:"FUNCTION VIRTUAL Ascii2BinST"},{n:63,t:"//! <Function Comment=\"*************************************************************************&#13;&#10;//    ASCII to BIN Konverter&#13;&#10;//  Übergeben Sie der Funktion den Pointer auf einen&#13;&#10;//  Char-String und den Pointer auf das Format(2 Byte Wert BINT).&#13;&#10;//  im Format werden nach der Wandlung folgende Daten für&#13;&#10;//  die gewandelte Zahl angezeigt:&#13;&#10;//&#13;&#10;//   -------------Format------------------------------&#13;&#10;//&#13;&#10;//       xxxx Oxxx 0000 0000&#13;&#10;//       .... .... .... **** Anz. der Stellen&#13;&#10;//       .... .... **** ....    pos. des Komma (von hinten)&#13;&#10;//       .... *... .... ....    Vorzeichen (True ist minus)&#13;&#10;//&#13;&#10;//&#13;&#10;//  Das Ergebnis der Wandlung ist ein direkter Rückgabewert&#13;&#10;//  der Funktion (DINT). Falls der zu wandelnde String fehlerhaft&#13;&#10;//  ist, wird als Ergebnis 0 zurückgegeben und im Format&#13;&#10;//  steht:&#13;&#10;//&#13;&#10;//  16#FFFF ..... ausgegebenes Format bei Wandlungsfehler&#13;&#10;//&#13;&#10;// *************************************************************************&#13;&#10;//    erstellt  :   MS    :     KW 12/02&#13;&#10;//      geändert  :     RV      :      KW 43/08&#13;&#10;// *************************************************************************&#13;&#10;//                    operation of ASCII2BIN function&#13;&#10;// *************************************************************************&#13;&#10;//[&gt;pta]Pointer auf CHAR-String&#13;&#10;//[&gt;ptb]Pointer auf Zahlen-Format&#13;&#10;//[&lt;ret_value]gewandelte Zahl aus ASCII-String&#13;&#10;//[#ENGLISH]&#13;&#10;// *************************************************************************&#13;&#10;//    ASCII to BIN Konverter&#13;&#10;//  The input variables of this function have to be a&#13;&#10;//  pointer  on a  Char-String  and a pointer  on a&#13;&#10;//  scheme(BINT). After the  conversion, the scheme will&#13;&#10;//  contain following data for your result&#13;&#10;//&#13;&#10;//   -------------scheme------------------------------&#13;&#10;//&#13;&#10;//       xxxx Oxxx 0000 0000&#13;&#10;//       .... .... .... **** no. of digits&#13;&#10;//       .... .... **** ....    pos. of decimal point (from lowest sign.)&#13;&#10;//       .... *... .... ....    sign (True ist minus)&#13;&#10;//&#13;&#10;//&#13;&#10;// The result of the conversion is immediately returned from&#13;&#10;//  the function (DINT). If the string contains errors (f.e. wrong&#13;&#10;//  signs, letters, ...) then the function will return zero&#13;&#10;//  and the scheme will be set to:&#13;&#10;//&#13;&#10;//  16#FFFF ...... scheme if error occured&#13;&#10;//&#13;&#10;// *************************************************************************&#13;&#10;//    created   :   MS    :     KW 12/02&#13;&#10;//      modified  :     RV      :      KW 43/08&#13;&#10;// *************************************************************************&#13;&#10;//                    operation of ASCII2BIN function&#13;&#10;// *************************************************************************&#13;&#10;//&#13;&#10;//&#13;&#10;//[&gt;pta]Pointer at CHAR-String&#13;&#10;//[&gt;ptb]Pointer at number-scheme&#13;&#10;//[&lt;ret_value]dec. Number from ASCII-String&#13;&#10;&#13;&#10; //GLOBAL ASCII_BIN::Ascii2Bin\" Name=\"Ascii2Bin\"/>"},{n:64,t:"FUNCTION VIRTUAL GLOBAL Ascii2Bin"},{n:72,t:"//! <Function Comment=\"To convert a number (UDINT) to a string!\" Name=\"udBin2Ascii\"/>"},{n:73,t:"FUNCTION VIRTUAL GLOBAL udBin2Ascii"},{n:79,t:"//! <Function Comment=\"To convert a string into a number(UDINT)\" Name=\"Ascii2udBin\"/>"},{n:80,t:"FUNCTION VIRTUAL GLOBAL Ascii2udBin"},{n:89,t:"FUNCTION @STD"},{n:93,t:"FUNCTION GLOBAL TAB @CT_;"},{n:99,t:"FUNCTION GLOBAL TAB ASCII_BIN::@CT_"},{n:104,t:"TO_UDINT(2897291062), \"ASCII_BIN\", //Class"},{n:121,t:"FUNCTION ASCII_BIN::@STD"},{n:129,t:"//Command Methods"},{n:198,t:"//                    operation of ASCII2BIN function"},{n:206,t:"//  The input variables of this function have to be a"},{n:220,t:"//  the function (DINT). If the string contains errors (f.e. wrong"}]},
