optional interface domains (leave 0 if none available)\"/>"},{n:44,t:"<File Path=\".\\Class\\VaranManager_Base\\VaranManager_Base.h\" Include=\"false\"/>"},{n:45,t:"<File Path=\".\\Class\\HwControl\\HwControl.h\" Include=\"true\"/>"},{n:46,t:"<File Path=\".\\Class\\HwControl\\watchdog.h\" Include=\"true\"/>"},{n:48,t:"<File Path=\".\\Class\\HwControl\\HwControlLogging.h\" Include=\"true\"/>"},{n:54,t:"<Dokumentation Revision=\"5.2\" Date=\"18.07.2018\" Author=\"PieSte&#13;&#10;EisMic\" Company=\"Sigmatek\" Description=\"Added support for HGW1033-3. (in SafetyManager)&#13;&#10;Removed incorrect LogMessage. Corrected access exception in method CalculateTaskInfo.&#13;&#10;OS_AddTraceKeyVal is not used anymore with OS-Version between 9.1.0 and 9.3.0. Not supported with these versions.\"/>"},{n:58,t:"<Dokumentation Revision=\"4.14\" Date=\"18.01.2018\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Added new NewInst command to get supported features by HwControl.&#13;&#10;The newinst cmd CMD_SET_POSTINIT_DONE will now be send to all connected classes instead of only to the DiasMaster.\"/>"},{n:59,t:"<Dokumentation Revision=\"4.13\" Date=\"23.01.2018\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Log messages have been standardized for easier maintenance, easier use in any class and to allow spam filtering. Code for the logging functions is now only located in HwControl.\"/>"},{n:60,t:"<Dokumentation Revision=\"4.12\" Date=\"05.01.2018\" Author=\"PieSte\" Company=\"Sigmatek\" Description=\"The safety UDP communication at &quot;SafetyManager&quot; class has been made more reliable. Now only new packages are allowed and old packages are discarded.\"/>"},{n:65,t:"<Dokumentation Revision=\"4.7\" Date=\"22.06.2017\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"If a disconnect happens in a multi master system with safety communication (more than 2 systems connected and exchanging safety data) now the other masters are notified about it to reestablish the connection.\"/>"},{n:66,t:"<Dokumentation Revision=\"4.6\" Date=\"01.03.2017\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Corrected an error in the handling of optional safety modules.\"/>"},{n:70,t:"<Dokumentation Revision=\"4.2\" Date=\"06.06.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Corrected error if distributed safety modules are connected after the initialisation phase.\"/>"},{n:72,t:"<Dokumentation Revision=\"4.0\" Date=\"30.11.2015\" Author=\"ZoePat&#13;&#10;LanSte\" Company=\"Sigmatek\" Description=\"Check for unallowed safety topology.\"/>"},{n:74,t:"<Dokumentation Revision=\"3.8\" Date=\"19.05.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"If two systems with FSoE safety were connected via VBC/VMC an error in the connection establishment could cause the FSoE connection to fail.\"/>"},{n:83,t:"<Dokumentation Revision=\"2.0\" Date=\"12.02.2014\" Author=\"PieSte\" Company=\"Sigmatek\" Description=\"Improved description of CyWork method.\"/>"},{n:84,t:"<Dokumentation Revision=\"1.50\" Date=\"06.12.2013\" Author=\"LanSte&#13;&#10;RamAnd&#13;&#10;FucHer\" Company=\"Sigmatek\" Description=\"Ensured that he class is copatible with old loader versions that do not support the post init phase.&#13;&#10;Removed domain support&#13;&#10;Changed AWL code to Structured Text.&#13;&#10;If the task setting for cyclic task fails, the error wasn&apos;t displayed.&#13;&#10;The task setting for cyclic task didn&apos;t work (only required if existing object is updated).\"/>"},{n:85,t:"<Dokumentation Revision=\"1.40\" Date=\"01.08.2013\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Corrected error, where the user classes are already called during SDIAS initialisation.\"/>"},{n:86,t:"<Dokumentation Revision=\"1.30\" Date=\"18.07.2013\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added PostInit interface of loader, where after the last init the varan managers can initialize modules until they are ready.\"/>"}]},

{rel:"Class\\SafetyCDIAS_Base\\SafetyCDIAS_Base.st",name:"SafetyCDIAS_Base.st",category:"Class",ext:".st",kb:499.7,url:"file:///C:/tmp/LSLCL2/LASAL/Class/SafetyCDIAS_Base/SafetyCDIAS_Base.st",hits:[{n:24,t:"// maximum number of tries to execute an asynchronous command (5 = if 5 consecutive tries to make an asynchronous communication fail, the class goes into error _AsyncComError)"},{n:27,t:"// version number of safety dll from which the quit error on CDIAS is supported"},{n:34,t:"#pragma message(\"DO_DEBUG for Safety-Modules activated! Needs more CPU ressources!\")"},{n:41,t:"#include \"..\\..\\Class\\SafetyCDIAS_Base\\SafetyCDIAS_Base.h\""},{n:43,t:"#include \"..\\..\\Class\\SafetyManager\\SafetyManager.h\""},{n:46,t:"<Class"},{n:58,t:"IconPath           = \".\\Class\\Safety.ico\""},{n:62,t:"<Server Name=\"ClassState\" GUID=\"{5D135176-5DDA-48A5-9E04-A1901F10F6FB}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Shows state of safety module&#13;&#10;&#13;&#10;_ModuleNotFound:&#13;&#10; - Module has not been found at the given position&#13;&#10;&#13;&#10;_WaitForSynchronicity:&#13;&#10; - Waiting to get synchrony with interacting modules&#13;&#10;&#13;&#10;_SafetyClassOK:&#13;&#10; - Module has been found and no errors reported&#13;&#10;&#13;&#10;_MemAllocFailed: &#13;&#10; - Failed to allocate or reallocate some memory for the module&#13;&#10;&#13;&#10;_ReadFWVerFailed:&#13;&#10; - Failed to read firmware version of module&#13;&#10;&#13;&#10;_ReinitConfig:&#13;&#10; - Only for CPU: Config of CPU has changed and update is in progress&#13;&#10;&#13;&#10;_ModFromCfgNotFound (Only for CPU):&#13;&#10; - Module in configuration, which is not physically available and HW-Class is placed&#13;&#10; - Module in configuration, which is not physically available and no HW-Class is placed&#13;&#10; - Module in configuration, which is not a CDIAS module (according to it&apos;s HW-Path)&#13;&#10;&#13;&#10;_UnsafeVarNotFound (Only for CPU):&#13;&#10; - Couldn&apos;t find an unsafe variable in the project. Compare spelling in Designer and in project.&#13;&#10;&#13;&#10;_UnknownCfgError (Only for CPU):&#13;&#10; - Error in reading config or creating routing tables occured.&#13;&#10;&#13;&#10;_AsyncComError: &#13;&#10; - Too many consecutive asynchronous commands failed! Please contact Sigmatek Support! &#13;&#10; &#13;&#10;_DOsIncreasedRestartApp: &#13;&#10; - Number or size of module accesses increased with new safety project! &#13;&#10; - =&gt; Can&apos;t continue, because the new data is not covered by the actual accesses! Restart Application! &#13;&#10; &#13;&#10;_LostPowerSupply: &#13;&#10; - The power supply of the safe CPU has been lost. &#13;&#10; &#13;&#10;_WrongSafetyHW: &#13;&#10; - The Safety objects in the project do not match the physical modules. &#13;&#10; - For every physical module a safety object must be placed in the project!\"/>"},{n:64,t:"<Server Name=\"Error\" GUID=\"{7722C658-8D6B-4FE0-8C80-E9F739F976B8}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"0: no error&#13;&#10;1: error&#13;&#10;2: communication timeout on input data from other safety modules\"/>"},{n:68,t:"<Server Name=\"QuitComError\" GUID=\"{1686D7E3-4EC5-48D3-8D8D-97BFF997515F}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"false\" Retentive=\"false\" Comment=\"Write to this server to quit communication errors (indicated if Server Error = 2)&#13;&#10;This server can also quit general errors (Server Error = 1) if the safety.dlm is used.&#13;&#10;&#13;&#10;To detect the used quit method, read the server directly after writing. In both cases the error quitting is done asynchronously (= not immediately).&#13;&#10;&#13;&#10;Server shows actual quit-state&#13;&#10;  2..busy with quitting general errors (safety dll version 6 or higher required)&#13;&#10;  1..busy with quitting communication error&#13;&#10;  0..ready&#13;&#10; -1..error at creating a new safety state&#13;&#10; -2..failed to disable user prompt for quit error&#13;&#10; -3..failed to select module via safety number&#13;&#10; -4..error at establishing connection to module (safety designer must not be online at the same time!)&#13;&#10; -5..failed to send the quit error command to the module&#13;&#10; -6..failed to delete the created safety state\"/>"},{n:70,t:"<Server Name=\"SafetyNumber\" GUID=\"{8120C4EB-E871-47BD-8BF0-B96C48AEF70C}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Shows the unique safety number of this module\"/>"},{n:72,t:"<Server Name=\"State\">"},{n:75,t:"<Client Name=\"ActivateFastUnsafeIOs\" Required=\"false\" Internal=\"false\" DefValue=\"0\" Comment=\"Setting to activate fast unsafe variables (realtime communication to the safety module)&#13;&#10;&#13;&#10;0..no fast unsafe IO variables active&#13;&#10;1..fast unsafe IO variables active (Servers FastUnsafeInput1..8 and FastUnsafeOutput1..8)\"/>"},{n:76,t:"<Client Name=\"AdditionalSPDOs\" Required=\"false\" Internal=\"false\" DefValue=\"0\" Comment=\"configure number of additional SPDOs transmitted every cycle to this safety module (by default 1 SPDO is transmitted)&#13;&#10;&#13;&#10;possible values are from 0 to 9&#13;&#10;&#13;&#10;to get the lowest transmission time, start your system with this client on 0&#13;&#10;read the value of the first private variable of this object (ui_cnt_PDOInputBuffer) subtract 1 and put this value to the client&#13;&#10;&#13;&#10;ATTENTION!&#13;&#10;The higher this value is, the more load will be on this modules cycle (has to process more PDOs)&#13;&#10;The size of the additional SPDOs can be set with the client SPDOWriteSize.\"/>"},{n:77,t:"<Client Name=\"DelayedStartup\" Required=\"false\" Internal=\"false\" DefValue=\"0\" Comment=\"0 .. If a Safety module would be connected after the startup phase of CPU, no reconfiguration is initiated.&#13;&#10;&#13;&#10;1 .. Reconfiguration of safety CPUs is initiated when modules are connected after the startup phase of CPU.&#13;&#10;If they are connected between the time gap of the check config time (3 minutes) of the safety CPU, there will be no error be active on the Safety CPU.&#13;&#10;If they are connected after the timeout of check config time, an error will be set at the safetymodules which can be quitted via the QuitComError server or the safety designer.\"/>"},{n:79,t:"<Client Name=\"ServerUpdateTime\" Required=\"false\" Internal=\"false\" DefValue=\"50\" Comment=\"Time in ms, how long the Servers (unsafe variables in Safety Designer) should take to update.&#13;&#10;This Client is automatically updated, if the given time is too short to handle with the current amount of servers.\"/>"},{n:83,t:"<File Path=\".\\Class\\SafetyCDIAS_Base\\SafetyCDIAS_Base.h\" Include=\"true\"/>"},{n:85,t:"<File Path=\".\\Class\\VaranManager_Base\\VaranManager_Base.h\" Include=\"false\"/>"},{n:86,t:"<File Path=\".\\Class\\SafetyManager\\SafetyManager.h\" Include=\"true\"/>"},{n:93,t:"<Dokumentation Revision=\"3.14\" Date=\"23.01.2018\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Log messages have been standardized for easier maintenance, easier use in any class and to allow spam filtering. Code for the logging functions is now only located in HwControl.\"/>"},{n:95,t:"<Dokumentation Revision=\"3.12\" Date=\"24.10.2017\" Author=\"HaeTho\" Company=\"Sigmatek\" Description=\"SA38381:&#13;&#10;. If in a system with EDGE2-CPU a CDIAS Safety Module connected via VARAN the VARAN distributor module is no more recognized.&#13;&#10;Solution:&#13;&#10;. If a safety module is present on a local CDIAS/SDIAS - bus the intern Move-Modus is no more activated.&#13;&#10;. The start of the data objects has been moved from the callback functions to the UpdateRT funktion.\"/>"},{n:99,t:"<Dokumentation Revision=\"3.8\" Date=\"06.06.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Corrected error if distributed safety modules are connected after the initialisation phase.\"/>"},{n:104,t:"<Dokumentation Revision=\"3.3\" Date=\"17.03.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Improved Method DtoH.\"/>"},{n:107,t:"<Dokumentation Revision=\"3.0\" Date=\"22.01.2014\" Author=\"RamAnd&#13;&#10;RamAnd\" Company=\"Sigmatek\" Description=\"Removed double assignment which could lead to a problem on ARM targets.&#13;&#10;If connected via VARAN, the PDOs are now activated in realtime to prevent errors at transmission.\"/>"},{n:108,t:"<Dokumentation Revision=\"2.90\" Date=\"05.12.2013\" Author=\"RamAnd&#13;&#10;RamAnd&#13;&#10;RamAnd&#13;&#10;LanSte\" Company=\"Sigmatek\" Description=\"Reactivated time synchronisation after reconnecting an optional module.&#13;&#10;Removed domain support&#13;&#10;Class has been adapted for communication with SDIAS Safety modules (class SafetyBase).&#13;&#10;Added Payload Support\"/>"}]},

{rel:"Class\\SafetyManager\\SafetyManager.st",name:"SafetyManager.st",category:"Class",ext:".st",kb:411.6,url:"file:///C:/tmp/LSLCL2/LASAL/Class/SafetyManager/SafetyManager.st",hits:[{n:9,t:"#include \"..\\..\\Class\\SafetyManager\\SafetyManager.h\""},{n:10,t:"#include \"..\\..\\Class\\HwControl\\HwControl.h\""},{n:16,t:"<Class"},{n:29,t:"IconPath           = \".\\Class\\Safety.ico\""},{n:32,t:"Comment            = \"Class to handle:&#13;&#10; - safety communication between domains&#13;&#10; - time synchronisation of safety modules\">"},{n:34,t:"<Server Name=\"ClassState\" Comment=\"Shows state of safety functionality initialisation&#13;&#10;&#13;&#10; 1..OK&#13;&#10; 0..not active or initializing&#13;&#10;-1..failed to allocate memory&#13;&#10;-2..invalid domain number set in this system&#13;&#10;-3..newer OS version required for domain number support&#13;&#10;-4..method to determine domain number not provided by lsl_st_hardwaretree.h&#13;&#10;-5..only 1 instance of safety manager allowed&#13;&#10;-6..a slave system can only have 1 master. check hw class configuration&#13;&#10;-7..invalid module type tried to log in&#13;&#10;-8..couldn&apos;t find InterfaceCRC which is requested by other domain. Check SafetyDesigner projects, most likely the interface variables doesn&apos;t match.&#13;&#10;-9..failed to add a new copy data object to varan manager&#13;&#10;-10..a non-optional module or domain is not available&#13;&#10;-11..timeout in initialisation (see debugger trace or logfile for further details)&#13;&#10;-12..invalid interface domain configuration (no safety module found, only interface domains)&#13;&#10;-13..failed to install callbacks for cyclic and realtime task\">"},{n:40,t:"<Client Name=\"SafetyDomainTimeout\" Required=\"false\" Internal=\"false\" Comment=\"[ms] the class has to wait for optional interface domains (leave 0 if none available)\"/>"},{n:49,t:"<File Path=\".\\Class\\SafetyManager\\SafetyManager.h\" Include=\"true\"/>"},{n:50,t:"<File Path=\".\\Class\\HwControl\\HwControl.h\" Include=\"true\"/>"},{n:59,t:"<Dokumentation Revision=\"2.10\" Date=\"27.03.2018\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Implemented New-Inst command CMD_POST_INIT_DISTRIBUTE_TASKTIMES which is called from HwControl.\"/>"},{n:61,t:"<Dokumentation Revision=\"2.8\" Date=\"23.01.2018\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Log messages have been standardized for easier maintenance, easier use in any class and to allow spam filtering. Code for the logging functions is now only located in HwControl.\"/>"},{n:62,t:"<Dokumentation Revision=\"2.7\" Date=\"05.01.2018\" Author=\"PieSte\" Company=\"Sigmatek\" Description=\"The safety UDP communication has been made more reliable. Now only new packages are allowed and old packages are discarded.\"/>"},{n:64,t:"<Dokumentation Revision=\"2.5\" Date=\"22.06.2017\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"If a disconnect happens in a multi master system with safety communication (more than 2 systems connected and exchanging safety data) now the other masters are notified about it to reestablish the connection.\"/>"},{n:67,t:"<Dokumentation Revision=\"2.2\" Date=\"06.06.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Corrected error if distributed safety modules are connected after the initialisation phase.\"/>"},{n:69,t:"<Dokumentation Revision=\"2.0\" Date=\"30.11.2015\" Author=\"ZoePat&#13;&#10;LanSte\" Company=\"Sigmatek\" Description=\"Check for unallowed safety topology.\"/>"},{n:71,t:"<Dokumentation Revision=\"1.47\" Date=\"19.05.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"If two systems with FSoE safety were connected via VBC/VMC an error in the connection establishment could cause the FSoE connection to fail.\"/>"},{n:76,t:"<Dokumentation Revision=\"1.42\" Date=\"14.04.2014\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Prevent crash if the safety configs are not available at startup.\"/>"},{n:79,t:"<Dokumentation Revision=\"1.30\" Date=\"18.07.2013\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Updated LogValue method to show also the actual object name.\"/>"},{n:80,t:"<Dokumentation Revision=\"1.20\" Date=\"07.03.2013\" Author=\"RamAnd&#13;&#10;RamAnd&#13;&#10;ZoePat\" Company=\"Sigmatek\" Description=\"Changed range of the safety NewInst commands. Range for HW-Classes: 0x8000-0x8FFF; Range for Safety HW-Classes: 0x8100-0x81FF&#13;&#10;Corrected order of managing time sync elements. It could have happened, that a subdomain returns the token to the master before sending it to their subdomains.&#13;&#10;Corrected minimal length of configuration.\"/>"},{n:81,t:"<Dokumentation Revision=\"1.10\" Date=\"22.01.2013\" Author=\"ZoePat&#13;&#10;RamAnd&#13;&#10;RamAnd&#13;&#10;RamAnd&#13;&#10;RamAnd\" Company=\"Sigmatek\" Description=\"Support for SCP010 added&#13;&#10;Corrected error in unsafe variable handling if a new safety project is downloaded, while the hardware classes are running.&#13;&#10;Send messages only to managing modules which are synchron.&#13;&#10;Added functionality for domain internal interface frames.&#13;&#10;Fixed memory leak in recreating the time sync list.\"/>"},{n:90,t:"Class      = \"SafetyUDP\""},{n:110,t:"Class      = \"CriticalSection\""},{n:120,t:"Class      = \"CriticalSection\""},{n:149,t:"</Class>"},{n:153,t:"SafetyManager : CLASS"}]},

rted)&#13;&#10;TCP_WOULD_ARP           -3041   //send needs to ARP but ARP is disabled (see INCLUDE_ARP)&#13;&#10;TCP_WOULD_BLOCK         -3042   //socket non-blocking but function would block&#13;&#10;TCP_UNKNOWN_ERROR       -3043\"/>"},{n:66,t:"<Dokumentation Revision=\"1.1\" Date=\"23.01.2018\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Log messages have been standardized for easier maintenance, easier use in any class and to allow spam filtering. Code for the logging functions is now only located in HwControl.\"/>"},{n:69,t:"</Class>"},{n:71,t:"SafetyUDP : CLASS"},{n:200,t:"FUNCTION SafetyUDP"},{n:204,t:"//! <Function Comment=\"-) initialize UDP/TCP USER pointer to use OS UDP/TCP FUNCTIONS&#13;&#10;-) read port number&#13;&#10;-) Allocate Memory for Buffers\" Name=\"Init\"/>"},{n:205,t:"FUNCTION VIRTUAL GLOBAL Init;"},{n:206,t:"//! <Function Comment=\"Cyclic call for main programm\" Name=\"CyWork\"/>"},{n:207,t:"FUNCTION VIRTUAL GLOBAL CyWork"},{n:212,t:"state (EAX) 	: UDINT;"},{n:215,t:"FUNCTION VIRTUAL GLOBAL Background"},{n:220,t:"state (EAX) 	: UDINT;"},{n:222,t:"//! <Function Comment=\"Call this Function to add a socket for sending Data to a UDP user\" Name=\"AddSocket\"/>"},{n:223,t:"FUNCTION VIRTUAL GLOBAL AddSocket"},{n:225,t:"dHandle 	: DINT;			//! <Variable Comment=\"Save this Handle to call the &quot;IsOpen&quot;,&quot;BindSocket&quot;, &quot;SendData&quot; and &quot;DelSocket&quot; Function\" Name=\"AddSocket.dHandle\"/>"},{n:227,t:"//! <Function Comment=\"Call this Function for receive Data from a UDP user\" Name=\"BindSocket\"/>"},{n:228,t:"FUNCTION VIRTUAL GLOBAL BindSocket"},{n:234,t:"pCallbackMeth 	: ^void;			//! <Variable Comment=\"Pointer to Method which should be called\" Name=\"BindSocket.pCallbackMeth\"/>"},{n:239,t:"//! <Function Comment=\"this function writes data into the TX buffer&#13;&#10;&#13;&#10;the first 4 Bytes are always the size of the following Data\" Name=\"RingbufferWrite\"/>"},{n:240,t:"FUNCTION RingbufferWrite"},{ 07.2018\" Author=\"LanSte&#13;&#10;ZoePat\" Company=\"Sigmatek\" Description=\"Added support for dynamic accesses.&#13;&#10;Added NewInst-command &quot;SDIAS_CLT_GET_INFO_PLACE&quot; to get the place.\"/>"},{n:83,t:"<Dokumentation Revision=\"1.57\" Date=\"13.03.2018\" Author=\"LanSte&#13;&#10;PieSte\" Company=\"Sigmatek\" Description=\"Added method GetHWTimeStamp.&#13;&#10;Add numbers for the assignment of the log messages.\"/>"},{n:85,t:"<Dokumentation Revision=\"1.55\" Date=\"23.01.2018\" Author=\"RamAnd&#13;&#10;ZoePat\" Company=\"Sigmatek\" Description=\"Log messages have been standardized for easier maintenance, easier use in any class and to allow spam filtering. Code for the logging functions is now only located in HwControl.&#13;&#10;If module is deacitvated by using DEACITVATED_LSL the client place is also set to the value DEACTIVATED_LSL.\"/>"},{n:87,t:"<Dokumentation Revision=\"1.53\" Date=\"10.05.2017\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"When adding an SDO (i.e. via ReadSPIData) from background priority it was possible that the adding process got interrupted by receiving the answer to this SDO which is handled in cyclic priority. In the error case the answer was unexpected and therefore ignored. Then the class signals a timeout while waiting for the answer, which already arrived before waiting for it. Added mutex and changed instruction order to prevent this error.\"/>"},{n:88,t:"<Dokumentation Revision=\"1.52\" Date=\"01.03.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Corrected BoundExceed Error at Write method of LEDControl Server when Place = LSL_DEACTIVATED.\"/>"},{n:93,t:"<Dokumentation Revision=\"1.47\" Date=\"30.09.2014\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added possibility to create a SDIAS control access.\"/>"},{n:96,t:"<Dokumentation Revision=\"1.44\" Date=\"17.07.2014\" Author=\"ZoePat\" Company=\"Sigmatek\" Description=\"Added function StartSDOIntelligent() to send a intelligent SDO to a module.\"/>"},{n:98,t:"<Dokumentation Revision=\"1.42\" Date=\"18.06.2014\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added new firmware error state bit which is set at not supported bus cycle times.\"/>"},{n:101,t:"<Dokumentation Revision=\"1.30\" Date=\"05.12.2013\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Changed login mechanism to sdias manager class to be independent of bus accesses.&#13;&#10;Added method AddAccesses to define special accesses which are not covered by the SDIAS info block.\"/>"},{n:102,t:"<Dokumentation Revision=\"1.20\" Date=\"30.08.2013\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added UpdateCy for SDIAS modules.\"/>"}]},

{rel:"Class\\SdiasManager\\SdiasManager.h",name:"SdiasManager.h",category:"Class",ext:".h",kb:15.3,url:"file:///C:/tmp/LSLCL2/LASAL/Class/SdiasManager/SdiasManager.h",hits:[{n:30,t:"//** NEWINST COMMANDS (Range reserved for SDIAS: 0x8250 - 0x827F)            **"},{n:33,t:"// newinst commands (Range reserved for SDIAS: 0x8250 - 0x827F)"},{n:47,t:"#define SDIAS_CMD_GET_MIB_ADDR              0x8261 // command to get pointer to info block (needed for diagnosis classes)"},{n:48,t:"#define SDIAS_CMD_GET_MOI_ADDR              0x8262 // command to get pointer to object info (needed for diagnosis classes)"},{n:54,t:"#define SDIAS_CMD_GET_OWN_OBJECTPATH        0x8268 // command to get own object path (needed for command Get Hardwaretree entry)"},{n:55,t:"#define SDIAS_CMD_ADD_DEVICE_ID             0x8269 // command to add valid device ids (needed that hardwareclass of vi022 works for a vi021 e.g.)"},{n:56,t:"#define SDIAS_CMD_GET_SUPPORTED_FEATURES    0x826A // command to get info bits about supported features from sdias manager class"},{n:70,t:"// define this to deactivate task checks (less VARAN load if SDIAS manager is behind VARAN. ATTENTION: RETRIES OF SINGLE ACCESSES ARE ALSO NOT CHECKED!)"},{n:86,t:"// manager place used for SDO requests which are adressed to the sdias manager itself"},{n:101,t:"// mask to get the tasks from the task config of the sdias client"},{n:209,t:"iCmdType            : USINT;   // Command type of access"},{n:210,t:"iNoOfReadBytes      : USINT;   // Number of bytes used in read command"},{n:211,t:"iModAddrRdCmd       : HINT;    // Module address of read command (Base adr + offset)"},{n:213,t:"iNoOfWriteBytes     : USINT;   // Number of bytes used in write command"},{n:214,t:"iModAddrWrCmd       : HINT;    // Module address of write command (Base adr + offset)"},{n:223,t:"iCmdType            : USINT;   // Command type of access"},{n:224,t:"iNoOfReadBytes      : USINT;   // Number of bytes used in read command"},{n:225,t:"iModAddrRdWrCmd     : HIN {rel:"Class\\SdiasManager\\SdiasManager.st",name:"SdiasManager.st",category:"Class",ext:".st",kb:376.2,url:"file:///C:/tmp/LSLCL2/LASAL/Class/SdiasManager/SdiasManager.st",hits:[{n:9,t:"// watchdog trigger interval (after 130ms of no trigger the SDIAS HW goes into reset again and takes at least another 10ms to be ready again)"},{n:12,t:"// time needed by sdias modules to start up after the watchdog is triggered the first time in ms"},{n:15,t:"// sdias manager needs 2 ticks to handle event for read task (measure sync time)"},{n:18,t:"// after activating the PLL SyncOut it takes 3 cycles until the SDIAS sync can be injected"},{n:79,t:"// if the protocol version ist below this, Control Read/Broadcast Write Command is not supported by sdiasmanager"},{n:82,t:"// if the cil version ist below this, Control Read/Broadcast Write Command is not supported by OS for local SDIAS."},{n:94,t:"#pragma message(\"ATTENTION: SDIAS real time measurement is active and needs additional ressources in the realtime task\")"},{n:97,t:"(* SDIAS data object commands  *)"},{n:98,t:"#define	 SDIAS_CMD_END							  0x00			(* End command										          *)"},{n:101,t:"#define	 SDIAS_CMD_GLOBAL						  0x03			(* SDIAS global command								      *)"},{n:102,t:"#define	 SDIAS_CMD_COPY_LOCAL					0x04			(* DPRAM copy command in local dpram				*)"},{n:103,t:"#define	 SDIAS_CMD_JMP_LOCAL					0x05			(* DPRAM jump command in local dpram 				*)"},{n:104,t:"#define  SDIAS_CMD_ACC_MEMORY_FAR     0x07      (* SDIAS Far Memory Access                  *)"},{n:106,t:"(* SDIAS defines for data object handling *)"},{n:108,t:"#define	 SDIAS_DOL_WRITE_USAGE_DOL_EMPTY	  0x20			(* Usage of empty write dol list (wachtdog trigger + end command)   *)"},{n:109,t:"#define	 SDIAS_DOL_WRITE_USAGE_DTA_EMPTY	  0x03			(* Usage of empty write dol data (DO ctrl of 2x copy command for task information + DO ctrl of watchdog trigger      *)"},{n:111,t:"#define	 SDIAS_DOL_WRITE_OFFSET_FIRST_DTA		0x02			(* Offset of first data byte of second copy command = 2 (DO ctrl)   *)"},{n:112,t:"#define	 SDIAS_DOL_WRITE_OFFSET_LAST_DTA		0x02			(* Offset of last data byte of second copy command = 2 (DO ctrl )   *)"},{n:115,t:"#define	 SDIAS_DOL_READ_USAGE_DOL_EMPTY	    0x30			(* Usage of empty read dol list (2x task info copy command + end command)   *)"},{n:116,t:"#define	 SDIAS_DOL_READ_USAGE_DTA_EMPTY	    0x0D			(* Usage of empty write dol data (DO ctrl of 2x copy command for task information + DO ctrl of watchdog trigger      *)"},{n:118,t:"#define	 SDIAS_DOL_READ_OFFSET_FIRST_DTA		0x07			(* Offset of first data byte of second copy command = 7 = DO state          *)"},{n:119,t:"#define	 SDIAS_DOL_READ_OFFSET_LAST_DTA		  0x0C			(* Offset of last data byte of second copy command = 12 (last byte of task information)       *)"},{n:121,t:"//Versionsnumber where SDIAS SPI Read Accesses are available"},{n:134,t:"#include \"..\\..\\Class\\SdiasManager\\SdiasManager.h\""},{n:136,t:"#include \"..\\..\\Class\\HwControl\\HwControl.h\""}]},
{rel:"Class\\SdiasPLC\\SdiasPLC.st",name:"SdiasPLC.st",category:"Class",ext:".st",kb:30.1,url:"file:///C:/tmp/LSLCL2/LASAL/Class/SdiasPLC/SdiasPLC.st",hits:[{n:5,t:"#define SDIASM_OBJECT_PATH            16#88000002   // Object Path for VSDIASmanager Length = 2 (First 2byte), Domain = 0 (3rd byte), Escape Sequence SDIAS (4th byte)"},{n:11,t:"<Class"},{n:23,t:"IconPath           = \".\\Class\\s-dias.ico\""},{n:27,t:"<Server Name=\"ClassState\" GUID=\"{CC338568-5E5E-4B72-BB67-E573CD9CE59F}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Shows the state of the SDIAS Manager.\"/>"},{n:31,t:"<Server Name=\"IsoRdTaskDuration\" GUID=\"{6DEF0FB2-2B7B-4859-A498-992DF86A9C33}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Time measurement of last iso read task at SDIAS in [µs]&#13;&#10;The measured time could be higher then the calculated time according to bit 4 &#13;&#10;of the manager option bits (0 .. with preprocessor time, 1 .. only execution time).\"/>"},{n:32,t:"<Server Name=\"IsoRdTaskMaxDuration\" GUID=\"{7407C9C7-AEDD-478D-94B7-18DEC7EA7537}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"false\" Retentive=\"false\" Comment=\"maximal time measurement of iso read task at SDIAS in [µs]\"/>"},{n:33,t:"<Server Name=\"IsoWrTaskDuration\" GUID=\"{107F6C59-3F86-4945-883C-1730324CE708}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"time measurement of last iso write task at SDIAS in [µs]\"/>"},{n:34,t:"<Server Name=\"IsoWrTaskMaxDuration\" GUID=\"{732E66FA-8CD0-4FE7-BB47-F47F45CD63D4}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"false\" Retentive=\"false\" Comment=\"maximal time measurement of iso write task at SDIAS in [µs]\"/>"},{n:35,t:"<Server Name=\"ManagerOptionBits\" GUID=\"{1ACFAA3D-1F6C-4193-9962-DACD4520FB4A}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Option Bits:&#13;&#10;Bit 0: Interrupts supported&#13;&#10;Bit 1: Half duplex (SDIAS S2), bus scan required&#13;&#10;Bit 2: Far Memory access supported&#13;&#10;Bit 3: Status wait supported (to differ TimeSliceError and TimeSliceErrorIRQ)&#13;&#10;Bit 4: Execution time selection supported&#13;&#10;Bit 5: Task interruption detection supported&#13;&#10;&#13;&#10;\"/>"},{n:36,t:"<Server Name=\"ManagerProtocolVersion\" GUID=\"{8A535859-D37E-4F82-A0C2-663478B1E502}\" Visualized=\"false\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Server shows the SDIAS Manager Protocol Version of the Module in the format xx.y.z&#13;&#10;e.g. 16#0130 means v01.3.0\"/>"},{n:37,t:"<Server Name=\"RetryCounter\" GUID=\"{3BC15DE0-3955-4B15-86D2-18FB43792F0F}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Actual Number of Retries on SDIAS-Bus.\"/>"},{n:38,t:"<Server Name=\"SdiasOut_1\" GUID=\"{80FBEABF-F831-4CD7-B6AC-3A0056083736}\" Visualized=\"false\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Connect a SDIAS Client Class\"/>"},{n:44,t:"<Dokumentation Revision=\"2.0\" Date=\"11.04.2018\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Added support to select the CPU-core on which the realtime and the cyclic task of the class should be executed.\"/>"},{n:45,t:"<Dokumentation Revision=\"1.54\" Date=\"27.04.2018\" Author=\"PieSte\" Company=\"Sigmatek\" Description=\"The behavior of Local SDIAS and SDIAS behind Varan was adjusted in the initialization phase. For local SDIAS the bus cycle time is passed to the SDIAS clients before the method AddAccesses() and for SDIAS after VARAN after the method. Now the bus cycle time is available in both variants in the method AddAccesses().\"/>"},{n:48,t:"<Dokumentation Revision=\"1.51\" Date=\"23.01.2018\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Log messages have been standardized for easier maintenance, easier use in any class and to allow spam filtering. Code for the logging functions is now only located in HwControl.\"/>"},{n:49,t:"<Dokumentation Revision=\"1.50\" Date=\"19.12.2017\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Since v1.86 the SDIAS Bus of the CP212 wasn&apos;t working anymore. (SyncOut ID was not found)\"/>"},{n:51,t:"<Dokumentation Revision=\"1.48\" Date=\"20.04.2017\" Author=\"PieSte&#13;&#10;EisMic\" Company=\"Sigmatek\" Description=\"Added sdias time calculation at hardware description file.&#13;&#10;Added manager options bit and steps in initialisation for execution time selection.&#13;&#10;TimeSliceErrorIRQ is now supported if feature is available in FPGA.\"/>"},{n:53,t:"<Dokumentation Revision=\"1.46\" Date=\"14.11.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Removed check for TimeSliceErrorIRQ if write task is interrupted by read task. The check could have led to a SDIAS-Error if SDIAS Safety modules were used or only a small amount of SDIAS modules were used.\"/>"},{n:54,t:"<Dokumentation Revision=\"1.45\" Date=\"11.10.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Added support that modules can access the Default-Access-Info in the AddAccesses Method.\"/>"},{n:56,t:"<Dokumentation Revision=\"1.43\" Date=\"22.04.2016\" Author=\"ZoePat\" Company=\"Sigmatek\" Description=\"Since V1.39 the RT-Postscan of the modules was called 1 rt-cycle to early. This led to a SDIAS-Error if a ICA011/111 was used on a Simple-Master CPU (e.g.: CP101/102).\"/>"},{n:57,t:"<Dokumentation Revision=\"1.42\" Date=\"17.02.2016\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Calculation of pointers for move DOs and access info has been corrected. If the original pointer is NIL now the resulting pointer also is NIL.\"/>"},{n:60,t:"<Dokumentation Revision=\"1.39\" Date=\"10.12.2015\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"It is now ensured that the SDIAS-hardwareclasses displays valid server values after Plug&amp;Play, if the classstate is _ClassOk.\"/>"},{n:61,t:"<Dokumentation Revision=\"1.38\" Date=\"11.05.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Corrected initialisation: It could have happened that a partial read list has been executed during startup, which could cause problems on SDIAS modules with FIFO-Buffers.\"/>"},{n:64,t:"<Dokumentation Revision=\"1.35\" Date=\"17.03.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added HW Version for sdias clients.\"/>"},{n:65,t:"<Dokumentation Revision=\"1.34\" Date=\"09.02.2015\" Author=\"PieSte\" Company=\"Sigmatek\" Description=\"Avoid error on local sdias if there is no or wrong hardware at module initialization.\"/>"}]},

"23.01.2018\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Log messages have been standardized for easier maintenance, easier use in any class and to allow spam filtering. Code for the logging functions is now only located in HwControl.\"/>"},{n:84,t:"<Dokumentation Revision=\"1.9\" Date=\"16.05.2017\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"When adding an SDO (i.e. via ReadSPIData) from background priority it was possible that the adding process got interrupted by receiving the answer to this SDO which is handled in cyclic priority. In the error case the answer was unexpected and therefore ignored. Then the class signals a timeout while waiting for the answer, which already arrived before waiting for it. Added mutex and changed instruction order to prevent this error.\"/>"},{n:88,t:"<Dokumentation Revision=\"1.5\" Date=\"01.03.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Corrected BoundExceed Error in base class at Write method of LEDControl Server when Place = LSL_DEACTIVATED.\"/>"},{n:92,t:"<Dokumentation Revision=\"1.1\" Date=\"17.03.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added HW Version for sdias clients.\"/>"},{n:101,t:"Class      = \"SdiasBase\""},{n:139,t:"</Class>"},{n:143,t:"ST011 : CLASS"},{n:292,t:"FUNCTION ST011"},{n:296,t:"//! <Function Comment=\"Realtime Update Methode which runs in PreScan.\" Name=\"UpdateRt\"/>"},{n:297,t:"FUNCTION VIRTUAL GLOBAL UpdateRt;"},{n:298,t:"//! <Function Comment=\"Realtime Update Methode which runs in PostScan.\" Name=\"UpdateRtPostScan\"/>"},{n:299,t:"FUNCTION VIRTUAL GLOBAL UpdateRtPostScan;"},{n:300,t:"//! <Function Comment=\"Methode is called if this Module gets connected.\" Name=\"ConnectEvent\"/>"},{n:301,t:"FUNCTION VIRTUAL GLOBAL ConnectEvent;"},{n:302,t:"//! <Function Comment=\"Methode is called if this Module gets disconnected.\" Name=\"DisconnectEvent\"/>"},{n:303,t:"FUNCTION VIRTUAL GLOBAL DisconnectEvent;"}]},

it 30: Motor enable error&#13;&#10;Bit 31: Three time sync in lost&#13;&#10;Bit 32: Safe Ramp down pending\"/>"},{n:97,t:"<Server Name=\"ExtendedStateWord\" GUID=\"{EC0DE156-F00E-48D8-8F99-E8B9378FF6F6}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Shows the extended motor state word.&#13;&#10;- Value is read asynchronous&#13;&#10;Bit 1 : Zero Position (Input)&#13;&#10;Bit 2 : Over temperature warning&#13;&#10;Bit 3 : Over temperature failure (disable drive)&#13;&#10;Bit 4 : Over current failure GND (disable drive)&#13;&#10;Bit 5 : Over current failure Bridge 1 (disable drive)&#13;&#10;Bit 6 : Over current failure Bridge 2 (disable drive)&#13;&#10;Bit 7 : 5V Incremental encoder ok&#13;&#10;Bit 8 : reserved&#13;&#10;Bit 9 : Bridge voltage too low&#13;&#10;Bit 10: Bridge voltage too high&#13;&#10;Bit 11: External Enable 1 (STO)&#13;&#10;Bit 12: External Enable 2 (STO)&#13;&#10;Bit 13: Safety start up status test ok&#13;&#10;Bit 14: Motor enable error&#13;&#10;Bit 15: Three time sync in lost&#13;&#10;Bit 16: Safe Ramp down pending\"/>"},{n:98,t:"<Server Name=\"ExternalEnable1\" GUID=\"{E1F1B4FF-7068-4218-A00D-8C7C16EA2F9D}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"State of External Enable  (STO).&#13;&#10;If the value is never refreshed it shows -2 147 483 632.&#13;&#10;- Value is read asynchronous&#13;&#10;0 .. off&#13;&#10;1 .. on&#13;&#10;\"/>"},{n:99,t:"<Server Name=\"ExternalEnable2\" GUID=\"{2CF5E1E9-B375-49EE-97AB-D534A47C4B7F}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"State of External Enable  (STO).&#13;&#10;If the value is never refreshed it shows -2 147 483 632.&#13;&#10;- Value is read asynchronous&#13;&#10;0 .. off&#13;&#10;1 .. on&#13;&#10;\"/>"},{n:120,t:"<Server Name=\"Input1LatchedFalling\" GUID=\"{4A344BB3-882B-4424-AAC1-5355FA983251}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"latched falling edge of first digital input&#13;&#10;signal will stay until read-method is called\"/>"},{n:121,t:"<Server Name=\"Input1LatchedRising\" GUID=\"{B6BDBAE6-1996-4C9A-9E62-F9586C63D72E}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"latched rising edge of first digital input&#13;&#10;signal will stay until read-method is called\"/>"},{n:123,t:"<Server Name=\"Input2LatchedFalling\" GUID=\"{3862811E-A228-4C93-AF1C-583A367EA847}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"latched falling edge of second digital input&#13;&#10;signal will stay until read-method is called\"/>"},{n:124,t:"<Server Name=\"Input2LatchedRising\" GUID=\"{1501D58D-5B78-4A43-B91F-FF46B63D63F4}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"latched rising edge of second digital input&#13;&#10;signal will stay until read-method is called\"/>"},{n:136,t:"<Server Name=\"VoltageOKEncoder\" GUID=\"{26A9C083-399F-4368-B10C-62F5CB63133C}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"Shows state of voltage supply of encoder.&#13;&#10;If the value is never refreshed it shows -2 147 483 632.&#13;&#10;- Value is read asynchronous&#13;&#10;0 .. Error at power supply.&#13;&#10;1 .. OK\"/>"},{n:156,t:"<Client Name=\"UseOszi\" Required=\"true\" Internal=\"false\" DefValue=\"0\" Comment=\"Activate oszi function of modul as init value.&#13;&#10;To use the Oszi function, the methods &quot;StartMeasure ()&quot; and &quot;GetMeasureState ()&quot; must be used.&#13;&#10;&#13;&#10;0 .. deactivated&#13;&#10;1 .. activated\"/>"},{n:180,t:"Class      = \"SdiasBase\""},{n:219,t:"</Class>"},{n:223,t:"ST151Base : CLASS"},{n:321,t:"13 LatchDigIn2Rise,  //! <Type Comment=\"Low bit of failure state depending on InternalLimitActive bit&#13;&#10;&#13;&#10;Meaning:&#13;&#10;2#00...N {rel:"Class\\StringInternal\\StringInternal.st",name:"StringInternal.st",category:"Class",ext:".st",kb:99.4,url:"file:///C:/tmp/LSLCL2/LASAL/Class/StringInternal/StringInternal.st",hits:[{n:6,t:"<Class"},{n:18,t:"IconPath           = \".\\Class\\StringInternal\\aString.ICO\""},{n:30,t:"<File Path=\".\\Class\\StringInternal\\StringDefs.h\" Include=\"false\"/>"},{n:36,t:"<Dokumentation Revision=\"1.81\" Date=\"2016-01-25\" Author=\"hubchr\" Company=\"Sigmatek GmbH &amp; Co KG\" Description=\"Bugfix:&#13;&#10;It is now possible to write a single CHAR character with the Method WriteDataOffUni();\"/>"},{n:47,t:"<Dokumentation Revision=\"1.6\" Date=\"2012-08-02\" Author=\"spimar\" Company=\"Sigmatek\" Description=\"Added a new method named WriteDataOffUni with which one it is possible, to hand over the size (Ascii or Uni), without set the identifier in front of the string!\"/>"},{n:58,t:"Class      = \"VirtualBaseInit\""},{n:76,t:"</Class>"},{n:80,t:"StringInternal : CLASS"},{n:91,t:"//! <Function Comment=\" to have a defined state after configuration&#13;&#10; calculate the CRC&#13;&#10;Die CRC wird am Anfang berechnet, um diesen Wert zu initialisieren&#13;&#10;\" Name=\"Init\"/>"},{n:92,t:"FUNCTION VIRTUAL GLOBAL Init;"},{n:93,t:"//! <Function Comment=\" returns the length of the raw data (without termination-0)&#13;&#10;liefert die Länge der Strings-Rohdaten ohne Abschluß-Null&#13;&#10;\" Name=\"GetLength\"/>"},{n:94,t:"FUNCTION VIRTUAL GLOBAL GetLength"},{n:98,t:"//! <Function Comment=\"The function extracts the given amount of bytes from a string-buffer.&#13;&#10;udAt specifies the starting position. pData is a pointer to a destination&#13;&#10;buffer, which has to be big enough to contain the extracted part.&#13;&#10;Die Funktion kopiert die angegebene Anzahl von Bytes ab dem Offset udAt&#13;&#10;aus dem String in einen zur Verfügung gestellten Ziel-Puffer. Dieser&#13;&#10;Puffer muß ausreichend groß sein, um den extrahierten Teil aufnehmen&#13;&#10;zu können.&#13;&#10;[&gt;udSize] Anzahl der Bytes, die kopiert werden sollen&#13;&#10;\" Name=\"GetDataAt\"/>"},{n:99,t:"FUNCTION VIRTUAL GLOBAL GetDataAt"},{n:105,t:"//! <Function Comment=\"Initialisiert den String mit konstanten Daten, z.B. aus einer Tabelle&#13;&#10;Der String wird als ASCII-String interpretiert.&#13;&#10;Initializes a string object with constant data (i.e. from a table)&#13;&#10;The string is assumed to be an ASCII-string&#13;&#10;\" Name=\"InitFromTable\"/>"},{n:106,t:"FUNCTION VIRTUAL GLOBAL InitFromTable"},{n:111,t:"//! <Function Comment=\" The function doesn&apos;t provide default functionality&#13;&#10; Please overwrite it for derived classes.&#13;&#10; Die Funktion stellt keine Standard-Implementierung dar. Sie muß für abgeleitete&#13;&#10; Klassen überschrieben werden.&#13;&#10;[&gt;udOff] Offset innerhalb des internen Datenpuffers, auf den die Daten kopiert werden sollen&#13;&#10;\" Name=\"WriteDataOff\"/>"},{n:112,t:"FUNCTION VIRTUAL GLOBAL WriteDataOff"},{n:118,t:"//! <Function Comment=\" The function returns a CRC of the string&apos;s data buffer&#13;&#10; This CRC is recalculated everytime the contents are changed&#13;&#10;Die Funktion liefert eine Prüfsumme über den Stringinhalt. Diese CRC&#13;&#10;wird bei jeder String-Änderung angepaßt.&#13;&#10;[&lt;udCRC]32-bit-CRC&#13;&#10;\" Name=\"GetCRC\"/>"},{n:119,t:"FUNCTION VIRTUAL GLOBAL GetCRC"},{n:123,t:"//! <Function Comment=\"Kopiert den Inhalt des übergebenen Strings in das eigene String-Objekt.&#13;&#10;Die Inhalte beider Strings sind danach ident.&#13;&#10; Copies the raw data from the passed string to the current one.&#13;&#10; The contents of the data blocks of both strings are the same&#13;&#10; afterwards.&#13;&#10;\" Name=\"StrCpy\"/>"},{n:124,t:"FUNCTION VIRTUAL GLOBAL StrCpy"},{n:128,t:"//! <Function Comment=\"The passed string is appended to the current string&#13;&#10;If the strings styles differ (ASCII/UNICODE), then the passed string&#13;&#10;will be converted to the current string&apos;s style prior to appending it.&#13;&#10;Der übergebene String wird an den eigenen String hinten angehängt.&#13;&#10;Wenn die Strings unterschiedliche Typen haben (ASCII/UNICODE), dann&#13;&#10;wird der übergebene String zuerst angepaßt, und dann erst angehängt.&#13;&#10;\" Name=\"StrCat\"/>"},{n:129,t:"FUNCTION VIRTUAL GLOBAL StrCat"},{n:133,t:"//! <Function Comment=\"Der String wird auf einen Leerstring gesetzt.&#13;&#10; the string contents of the string are set to an empty string&#13;&#10;\" Name=\"Clear\"/>"}]},

e class status.\"/>"},{n:64,t:"<Server Name=\"ValidateSerNo\" GUID=\"{5B28FD6D-A4BE-419D-933F-49B93A7F83C2}\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"false\" Retentive=\"false\" Comment=\"if the validation of the serial number is activated (SerNoValidation = 1)&#13;&#10;the serial number of the actual module can be validated by writing to this server&#13;&#10;&#13;&#10;this server shows also the state of validation:&#13;&#10;-2..validation not acivated&#13;&#10;-1..no module validated on this position&#13;&#10; 0..module is not the validated one&#13;&#10; 1..module is the validated one\"/>"},{n:69,t:"<Client Name=\"SerNoValidation\" Required=\"false\" Internal=\"false\" Comment=\"0..serial number of varan client does not matter&#13;&#10;1..serial number of varan client has to be validated, to use the module&#13;&#10;&#13;&#10;validation is done via write(1) to the ValidateSerNo Server\"/>"},{n:72,t:"<Client Name=\"To_MultiTask\" Required=\"false\" Internal=\"false\" Comment=\"This client is automatically connected to a OS interface class.\"/>"},{n:73,t:"<Client Name=\"To_StdLib\" Required=\"false\" Internal=\"false\" Comment=\"This client is automatically connected to a OS interface class.\"/>"},{n:74,t:"<Client Name=\"Transparent\" Required=\"false\" Internal=\"false\" DefValue=\"0\" Comment=\"If this Client is set to 1 the module is not used for building the VARAN-Tree\"/>"},{n:75,t:"<Client Name=\"UserAction\" Required=\"false\" Internal=\"false\" Comment=\"optional, connect to server to get Varan states via write method.&#13;&#10;possible input values:&#13;&#10; 0..connect&#13;&#10; 1..disconnect&#13;&#10; 2..required data object error&#13;&#10; 3..not required data object error&#13;&#10; 4..fatal error&#13;&#10; 5..time slice error&#13;&#10; 6..watchdog error&#13;&#10; 7..client irq&#13;&#10; 8..device enable&#13;&#10; 9..device disable&#13;&#10;10..irq task interrupt&#13;&#10;11..reactivation of node which was deactivated by software before&#13;&#10;12..irq for direct access alternating buffer (VMC module)&#13;&#10;13..dias error&#13;&#10;14..cdias error (cdias module required behind a CIV)&#13;&#10;&#13;&#10;&#13;&#10;Possible return values:&#13;&#10;0......ok&#13;&#10;&lt;&gt; 0...Generate VaranError&#13;&#10;\"/>"},{n:76,t:"<Client Name=\"VaranIn\" Required=\"true\" Internal=\"false\" Comment=\"This class must be connected to a VARAN port or a VaranOut_[x] server.\"/>"},{n:80,t:"<File Path=\".\\Class\\VaranManager_Base\\VaranManager_Base.h\" Include=\"false\"/>"},{n:82,t:"<File Path=\".\\Class\\HwControl\\HwControl.h\" Include=\"true\"/>"},{n:91,t:"<Dokumentation Revision=\"2.12\" Date=\"23.01.2018\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Log messages have been standardized for easier maintenance, easier use in any class and to allow spam filtering. Code for the logging functions is now only located in HwControl.\"/>"},{n:97,t:"<Dokumentation Revision=\"2.6\" Date=\"17.03.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added support for Varan Mux.\"/>"},{n:98,t:"<Dokumentation Revision=\"2.5\" Date=\"24.03.2015\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Check pointer p_NodeInfo for validity in method GetRetryTimeout due to access exception error if method Varan_HWDisconnect is called and no hardware was available.\"/>"},{n:103,t:"<Dokumentation Revision=\"2.0\" Date=\"04.12.2013\" Author=\"RamAnd&#13;&#10;FucHer&#13;&#10;LanSte\" Company=\"Sigmatek\" Description=\"Removed domain support&#13;&#10;Changed AWL code to Structured Text.&#13;&#10;Added Payload Support&#13;&#10;Added include for PCI accesses, which is necessary to find out if the Varan Manager supports LongDOs.\"/>"},{n:104,t:"<Dokumentation Revision=\"1.90\" Date=\"30.08.2013\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"The class could have change the state to _DisableError after the disconnect from VARAN, even if there was no further problem.\"/>"},{n:106,t:"<Dokumentation Revision=\"1.70\" Date=\"18.07.2013\" Author=\"LanSte&#13;&#10;ZoePat\" Company=\"Sigmatek\" Description=\"Added Payload Support&#13;&#10;Check if manager is on at function GetNodeInfo() to get different states for connected and disconnected modules if manager is turned off (e.g.: in case of required error that was handled by client UserAction)\"/>"},{n:108,t:"<Dokumentation Revision=\"1.50\" Date=\"05.11.2012\" Author=\"RamAnd&#13;&#10;RamAnd\" Company=\"Sigmatek\" Description=\"Corrected time measurement for internal tests.&#13;&#10;Removed resetting of the FPGA retry counter in method ResetDataObject which could result in a wrong behavior of the RetryCounter server.\"/>"}]},

\" Comment=\"0 = alive counter of superior system not ok, 1 = superior system works, -1 = varan manager client is not used\"/>"},{n:56,t:"<Client Name=\"IsoStartPoint\" Required=\"false\" Internal=\"false\" Comment=\"Time of the isochronous VARAN task as a percentage of the VaranManager time. &#13;&#10;defines the offset between start of realtime-task and start of isochronous VARAN data transfer&#13;&#10;&#13;&#10;Value range between 1 and 99 % (default: 50)&#13;&#10;&#13;&#10;e.g.: IsoStartPoint = 70 and VaranManagerTime = 1000000 -&gt; Isochronous VARAN task gets 300 µs, the hardware classes (real time of the controller) get 700 µs. &#13;&#10;As an initialization value&#13;&#10;\"/>"},{n:63,t:"<Client Name=\"SuperiorSystemTime\" Required=\"false\" Internal=\"false\" Comment=\"varan time of superior system in ns, has to be a multiple of VaranManagerTime\"/>"},{n:64,t:"<Client Name=\"To_HwControl\" Required=\"true\" Internal=\"false\" Comment=\"connect to server &quot;Control&quot; of HwControl class\"/>"},{n:65,t:"<Client Name=\"To_Multitask\" Required=\"false\" Internal=\"false\" Comment=\"is connected automatically to os class\"/>"},{n:67,t:"<Client Name=\"VaranManagerTime\" Required=\"false\" Internal=\"false\" DefValue=\"1000000\" Comment=\"The real-time of the VaranManager hardware classes and the VARAN Isochronous DataObjectList is set here.&#13;&#10;Unit: ns&#13;&#10;Default value: 1000000 (=1ms)        &#13;&#10;As an initialization value\"/>"},{n:72,t:"<File Path=\".\\Class\\VaranManager\\VaranManager.h\" Include=\"true\"/>"},{n:73,t:"<File Path=\".\\Class\\SafetyManager\\SafetyManager.h\" Include=\"true\"/>"},{n:81,t:"<Dokumentation Revision=\"2.36\" Date=\"10.01.2018\" Author=\"EisMic&#13;&#10;&#13;&#10;&#13;&#10;ZoePat\" Company=\"Sigmatek\" Description=\"Cywork will no longer be called if there are no VaranClient objects connected to the manager.&#13;&#10;The hardware will now be turned off in the method SetVaranDOError.&#13;&#10;Attached header files no longer point to the installation directory of LASAL but instead now point to the the source/interfaces folder.&#13;&#10;Fixed an error that when starting a project the time for the hardware on the Varan, i. e. after IsoStartPoint is too short, the status is not TimeSliceError but TimeSliceErrorIRQ.\"/>"},{n:83,t:"<Dokumentation Revision=\"2.34\" Date=\"23.01.2018\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Log messages have been standardized for easier maintenance, easier use in any class and to allow spam filtering. Code for the logging functions is now only located in HwControl.\"/>"},{n:90,t:"<Dokumentation Revision=\"2.27\" Date=\"24.02.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"CAN behind VARAN works now on Edge2 CPUs.\"/>"},{n:91,t:"<Dokumentation Revision=\"2.26\" Date=\"28.09.2015\" Author=\"ZoePat\" Company=\"Sigmatek\" Description=\"New function to set a VaranManagerError.\"/>"},{n:93,t:"<Dokumentation Revision=\"2.24\" Date=\"21.05.2015\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Corrected handling of SyncFrameCounter in RtWork which could lead to a problem at isochrone CAN behind varan (e.g. CIV 521).\"/>"},{n:97,t:"<Dokumentation Revision=\"2.20\" Date=\"23.03.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Prevent crash if the user calls public methods and the VARAN interface is not available (e.g. on LARS)\"/>"}]},
{rel:"Class\\VaranManager_1\\VaranManager_1.st",name:"VaranManager_1.st",category:"Class",ext:".st",kb:18.4,url:"file:///C:/tmp/LSLCL2/LASAL/Class/VaranManager_1/VaranManager_1.st",hits:[{n:6,t:"<Class"},{n:18,t:"IconPath           = \".\\Class\\VaranManager_1\\VaranManager.ico\""},{n:21,t:"Comment            = \"class to handle a VaranManager component with 1 VARAN Out port\">"},{n:23,t:"<Server Name=\"VaranOut_1\" GUID=\"{0BE4D2F2-F359-40DE-B933-9F51683D8A0B}\" Class=\"Hub_Base\" Visualized=\"true\" Initialize=\"false\" WriteProtected=\"true\" Retentive=\"false\" Comment=\"connect a varan client class\"/>"},{n:30,t:"<Dokumentation Revision=\"1.66\" Date=\"07.03.2018\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Cywork will no longer be called if there are no VaranClient objects connected to the manager.&#13;&#10;The hardware will now be turned off in the method SetVaranDOError.&#13;&#10;Attached header files no longer point to the installation directory of LASAL but instead now point to the the source/interfaces folder.&#13;&#10;Fixed an error that when starting a project the time for the hardware on the Varan, i. e. after IsoStartPoint is too short, the status is not TimeSliceError but TimeSliceErrorIRQ.\"/>"},{n:32,t:"<Dokumentation Revision=\"1.64\" Date=\"23.01.2018\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Log messages have been standardized for easier maintenance, easier use in any class and to allow spam filtering. Code for the logging functions is now only located in HwControl.\"/>"},{n:38,t:"<Dokumentation Revision=\"1.58\" Date=\"10.02.2016\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"CAN behind VARAN works now on Edge2 CPUs.\"/>"},{n:39,t:"<Dokumentation Revision=\"1.57\" Date=\"11.11.2015\" Author=\"ZoePat\" Company=\"Sigmatek\" Description=\"Check for unallowed safety topology.\"/>"},{n:41,t:"<Dokumentation Revision=\"1.55\" Date=\"21.05.2015\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Corrected handling of SyncFrameCounter in RtWork which could lead to a problem at isochrone CAN behind varan (e.g. CIV 521).\"/>"},{n:45,t:"<Dokumentation Revision=\"1.51\" Date=\"23.03.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Prevent crash if the user calls public methods and the VARAN interface is not available (e.g. on LARS)\"/>"},{n:46,t:"<Dokumentation Revision=\"1.50\" Date=\"24.01.2015\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"If a post init object is finished (completed or error) than it&apos;s still called during the post init phase to allow triggering of watchdogs.&#13;&#10;Furthermore this module is removed from the list of modules to wait for (creating DOs and Move-DOs).\"/>"},{n:47,t:"<Dokumentation Revision=\"1.49\" Date=\"25.11.2014\" Author=\"LanSte\" Company=\"Sigmatek\" Description=\"Corrected IsoVaranTime calcualtion with MultivaranInterface.&#13;&#10;Corrected Trace Message when an unknown NewInst command was recieved.\"/>"},{n:48,t:"<Dokumentation Revision=\"1.48\" Date=\"11.08.2014\" Author=\"EisMic\" Company=\"Sigmatek\" Description=\"Deactivated Varan Error when running a programm in LARS.\"/>"},{n:49,t:"<Dokumentation Revision=\"1.47\" Date=\"01.08.2014\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Asynchron VARAN DOs may not have been started on ARM CPUs, because the image of the DOs wasn&apos;t copied correctly to the VM DPRAM.\"/>"},{n:53,t:"<Dokumentation Revision=\"1.43\" Date=\"15.04.2014\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Changed initialisation:&#13;&#10; - Asynchron work is now independent of isochronous initialisation state machine&#13;&#10; - Removed thread for sorting DOs. This is now done in a seperate init step called by the HwControl\"/>"},{n:58,t:"<Dokumentation Revision=\"1.30\" Date=\"22.01.2014\" Author=\"RamAnd&#13;&#10;&#13;&#10;PieSte\" Company=\"Sigmatek\" Description=\"Initialisation of VaranManager and SdiasManager has been reworked for cases where multiple Safety cpus are connected via VI021.&#13;&#10;Fixed free FileDate before use in Base VaranManager.\"/>"},{n:59,t:"<Dokumentation Revision=\"1.20\" Date=\"04.12.2013\" Author=\"LanSte&#13;&#10;RamAnd&#13;&#10;FucHer\" Company=\"Sigmatek\" Description=\"Added NewInst Method to allow force endeing PostInit on timeout.&#13;&#10;Fixed call to end VM own PostInit Phase.&#13;&#10;Added postinit call to prevent user classes being called before the Varanmanager has finished its config.&#13;&#10;Fixed case dureing startup where the ISO DOL was started twice in one cycle.&#13;&#10;The manager has added himself to the internal client list, which lead to writing 68 to the control server if a required error occured.&#13;&#10;Fixed crash if no VARAN interface was available, but objects of VARAN module classes were placed.&#13;&#10;Added payload support&#13;&#10;GetVaranPosition(): keyword AWL removed.  Mutex replaces CLI, STI.\"/>"},{n:60,t:"<Dokumentation Revision=\"1.10\" Date=\"07.03.2013\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Changed range of the safety NewInst commands. Range for HW-Classes: 0x8000-0x8FFF; Range for Safety HW-Classes: 0x8100-0x81FF\"/>"},{n:61,t:"<Dokumentation Revision=\"1.4\" Date=\"05.10.2011\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"The Client To_Multitask of the base class has been moved to the bottom, since it has no connection to the derivations.\"/>"},{n:63,t:"<Dokumentation Revision=\"1.2\" Date=\"15.10.2010\" Author=\"RamAnd\" Company=\"Sigmatek\" Description=\"Added method AddMovDO for the move command in the VM.\"/>"},{n:64,t:"<Dokumentation Revision=\"1.1\" Date=\"15.10.2010\" Author=\"BleErn\" Company=\"Sigmatek\" Description=\"Added new method GetNsTimeBPLLTicks for easier internal time measurements.&#13;&#10;Added new methods AddDAClientRdData and SendDAClientWrData to access new direct access alternating buffer on VMC hardware.&#13;&#10;Function to display CDIAS/DIAS required error&#13;&#10;VaranManager crashed if the master was shut-down when the master was not started (eg. _NoVaranInterface on LARS)&#13;&#10;Read-Method of clients is now always called before using a value.&#13;&#10;Trace-Messages now only appear once&#13;&#10;Act_RtTime showed incorrect values if no hardware was connected&#13;&#10;Comment of Server ManagerOn was not complete&#13;&#10;Server SuperiorSystemOK now shows if VaranManagerClient functionality is not used&#13;&#10;Time-Measurement of VaranManager did not stop if Manager was set off but rest of system was still alive\"/>"},{n:73,t:"Class      = \"VaranManager\""},{n:90,t:"<Server Name=\"State\"/>"},{n:111,t:"Class      = \"Hub_Base_Root\""},{n:126,t:"<Connection Source=\"this.State\" Destination=\"_base.State\" Vertices=\"(1942,270),(1064,270),\"/>"}]},
{rel:"Class\\VaranManager_Base\\VaranManager_Base.h",name:"VaranManager_Base.h",category:"Class",ext:".h",kb:19.1,url:"file:///C:/tmp/LSLCL2/LASAL/Class/VaranManager_Base/VaranManager_Base.h",hits:[{n:17,t:"//#define VM_CLASS_TIME_MEASUREMENT		// to activate time measurement of varan classes (should be deactivated)"},{n:19,t:"//#define VARAN_DIAGNOSE              // to activate diagnose for varan"},{n:21,t:"//Varan Manager class version //BleErn 04.01.2011 17:17: Revision is now fetched from class properties!"},{n:111,t:"//max number of varan manager classes"},{n:137,t:"#define VM_RETRY_TIMEOUT_DA				12340		//for direct accesses (128Byte see Design Spec Varan)"},{n:138,t:"#define VM_RETRY_TIMEOUT_STD_OFFSET		3000		//standard timeout for a varan DO (2000ns) + option for analyser (1000ns)"},{n:139,t:"#define VM_TIMEOUT_ONE_BYTE				80			//timeout time for one byte (varan)"},{n:141,t:"#define	VM_HUB_DELAY_TIME				1100		//Time delay of one varan hub (added to retry timeout time per hub)"},{n:145,t:"#define VM_START_HANDLES		50			//number of class handles at startup"},{n:158,t:"#define VM_SYNC_OUT_ID				2   // VARAN Manager Trigger"},{n:205,t:"// priorities for execution (primary for safety DOs, where 1=read, 2=copy and 3=write) used in type of DO-Access"},{n:208,t:"#define VM_PRIORITY_2               16#00000200 // internal copy/move command"},{n:224,t:"// Defines for the commands of the Control NewInst method"},{n:237,t:"#define VM_CMD_DO_CREATION_FINISHED       16#801C // a post init object tells the varan manager it has finished DO creation"},{n:238,t:"#define VM_CMD_DO_MEM_READY               16#801D // a post init object asks the varan manager if all post init objects have finished DO creation"},{n:239,t:"#define VM_CMD_MOVE_DO_CREATION_FINISHED  16#801E // a post init object tells the varan manager it has finished Move DO creation"},{n:240,t:"#define VM_CMD_MOVE_DO_MEM_READY          16#801F // a post init object asks the varan manager if all post init objects have     const q = document.getElementById('q');
    const cat = document.getElementById('cat');
    const result = document.getElementById('result');
    const allBtn = document.getElementById('allBtn');
    const hitsBtn = document.getElementById('hitsBtn');
    let onlyHits = false;

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function matches(item, term) {
      const hay = [item.rel, item.name, item.category, item.ext, ...item.hits.map(h => h.t)].join(' ').toLowerCase();
      return hay.includes(term);
    }

    function render() {
      const term = q.value.trim().toLowerCase();
      const category = cat.value;
      let rows = files.filter(f => (!category || f.category === category) && (!term || matches(f, term)));
      if (onlyHits) rows = rows.filter(f => f.hits.length);
      rows = rows.slice(0, 250);

      if (!rows.length) {
        result.innerHTML = '<div class="empty">Keine Dateien gefunden.</div>';
        return;
      }

      result.innerHTML = rows.map(f => {
        const hits = f.hits.length
          ? '<pre>' + f.hits.map(h => '<span class="hit"><span class="line">' + h.n + '</span><span>' + esc(h.t) + '</span></span>').join('') + '</pre>'
          : '<div class="small">Keine extrahierten Schluesselzeilen.</div>';
        return '<section class="card">'
          + '<div class="row"><div><div class="path">' + esc(f.rel) + '</div><div class="small">' + esc(f.category) + ' Â· ' + esc(f.ext || '(ohne Endung)') + ' Â· ' + f.kb + ' KB</div></div>'
          + '<a href="' + esc(f.url) + '">Oeffnen</a></div>'
          + hits
          + '</section>';
      }).join('');
    }

    q.addEventListener('input', render);
    cat.addEventListener('change', render);
    allBtn.addEventListener('click', () => { onlyHits = false; allBtn.classList.add('active'); hitsBtn.classList.remove('active'); render(); });
    hitsBtn.addEventListener('click', () => { onlyHits = true; hitsBtn.classList.add('active'); allBtn.classList.remove('active'); render(); });
    render();
  </script>
