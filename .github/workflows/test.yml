name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pc-console:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test PC console command model
        run: node tools/test_pc_console.js
